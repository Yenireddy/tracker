// Convert JS object → Firestore REST fields format
function toFirestore(obj) {
  function convert(val) {
    if (val === null || val === undefined) return { nullValue: null };
    if (typeof val === "boolean") return { booleanValue: val };
    if (typeof val === "number") return Number.isInteger(val) ? { integerValue: String(val) } : { doubleValue: val };
    if (typeof val === "string") return { stringValue: val };
    if (Array.isArray(val)) return { arrayValue: { values: val.map(convert) } };
    if (typeof val === "object") {
      const fields = {};
      Object.entries(val).forEach(([k, v]) => { fields[k] = convert(v); });
      return { mapValue: { fields } };
    }
    return { stringValue: String(val) };
  }
  const fields = {};
  Object.entries(obj).forEach(([k, v]) => { fields[k] = convert(v); });
  return { fields };
}

// Convert Firestore REST fields → JS object
function fromFirestore(fields) {
  function parse(val) {
    if ("nullValue" in val) return null;
    if ("booleanValue" in val) return val.booleanValue;
    if ("integerValue" in val) return Number(val.integerValue);
    if ("doubleValue" in val) return val.doubleValue;
    if ("stringValue" in val) return val.stringValue;
    if ("arrayValue" in val) return (val.arrayValue.values || []).map(parse);
    if ("mapValue" in val) {
      const obj = {};
      Object.entries(val.mapValue.fields || {}).forEach(([k, v]) => { obj[k] = parse(v); });
      return obj;
    }
    return null;
  }
  const obj = {};
  Object.entries(fields || {}).forEach(([k, v]) => { obj[k] = parse(v); });
  return obj;
}

async function loadFromFirestore() {
  try {
    const res = await fetch(`${FB_BASE}?key=${FB_API_KEY}`);
    if (!res.ok) return null;
    const json = await res.json();
    if (json.fields) return fromFirestore(json.fields);
  } catch(e) { console.error("Firestore load error:", e); }
  return null;
}

async function saveToFirestore(data) {
  try {
    const body = JSON.stringify(toFirestore(data));
    await fetch(`${FB_BASE}?key=${FB_API_KEY}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body,
    });
  } catch(e) { console.error("Firestore save error:", e); }
}

function Donut({data,size=140,stroke=22}){
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let off=0;
  const r=(size-stroke)/2, c=2*Math.PI*r;
  const slices=data.map(d=>{const dash=c*(d.value/total);const o=off;off+=dash;return{...d,dash,gap:c-dash,off:o};});
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth={stroke}/>
      {slices.map((s,i)=>(
        <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={s.color} strokeWidth={stroke}
          strokeDasharray={`${s.dash} ${s.gap}`} strokeDashoffset={c/4-s.off} strokeLinecap="round"/>
      ))}
    </svg>
  );
}

function LineChart({data,labels,color="#00f0dc",h=100}){
  if(!data||data.length<2) return null;
  const w=340, mn=Math.min(...data)*.93, mx=Math.max(...data)*1.05;
  const xs=data.map((_,i)=>(i/(data.length-1))*w);
  const ys=data.map(v=>h-((v-mn)/(mx-mn||1))*(h-18)-6);
  const pts=xs.map((x,i)=>`${x},${ys[i]}`).join(" ");
  const area=`M0,${h} L${xs.map((x,i)=>`${x},${ys[i]}`).join(" L")} L${w},${h} Z`;
  const gid=`g${color.replace(/\W/g,"")}`;
  return(
    <svg width="100%" viewBox={`0 0 ${w} ${h+16}`} style={{overflow:"visible"}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity=".2"/>
        <stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      <path d={area} fill={`url(#${gid})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {xs.map((x,i)=>(
        <g key={i}>
          {i===xs.length-1?<circle cx={x} cy={ys[i]} r={4} fill={color} stroke="#080b12" strokeWidth="2"/>:<circle cx={x} cy={ys[i]} r={2.5} fill={color} fillOpacity=".6"/>}
          <text x={x} y={h+14} textAnchor="middle" fill="rgba(255,255,255,.28)" fontSize="9" fontFamily="Outfit">{labels[i]}</text>
        </g>
      ))}
    </svg>
  );
}

function Modal({title,onClose,children}){
  // Lock background scroll while the modal is open
  useEffect(()=>{
    const prev=document.body.style.overflow;
    document.body.style.overflow="hidden";
    return()=>{ document.body.style.overflow=prev; };
  },[]);
  const ui=(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",backdropFilter:"blur(2px)",WebkitOverflowScrolling:"touch",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"24px 12px 60px"}} onClick={onClose}>
      <div style={{width:"100%",maxWidth:430,background:"#0e1525",borderRadius:20,padding:"22px 20px 26px",border:"1px solid rgba(255,255,255,.08)",boxShadow:"0 16px 50px rgba(0,0,0,.6)"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <span style={{fontSize:17,fontWeight:700}}>{title}</span>
          <button onClick={onClose} style={{background:"rgba(255,255,255,.08)",border:"none",color:"#fff",width:30,height:30,borderRadius:8,fontSize:15}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
  // Render through a portal to <body> so a transformed ancestor (the screen's slide-in animation)
  // can't anchor this fixed overlay to itself — it always covers the real viewport.
  return (typeof ReactDOM!=="undefined"&&ReactDOM.createPortal)?ReactDOM.createPortal(ui,document.body):ui;
}

  const totalOut=transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const stockVal=stocks.reduce((s,st)=>s+st.qty*st.currentPrice,0);
  const mfVal=mfs.reduce((s,m)=>s+mfUnits(m)*m.currentNAV,0);
  const goldG=metalSchemes.filter(s=>s.metal==="gold").reduce((s,sc)=>s+sc.installments.reduce((a,i)=>a+i.gramsAllotted,0),0);
  const silverG=metalSchemes.filter(s=>s.metal==="silver").reduce((s,sc)=>s+sc.installments.reduce((a,i)=>a+i.gramsAllotted,0),0);
  const goldVal=goldG*prices.gold22k, silverVal=silverG*prices.silver999;
  const bankTotal=bankBalances.reduce((s,b)=>s+b.balance,0);
  const totalDebt=loans.reduce((s,l)=>s+l.remaining,0)+cards.reduce((s,c)=>s+c.outstanding,0);
  const netWorth=stockVal+mfVal+goldVal+silverVal+bankTotal+(totalIn-totalOut)-totalDebt;

  const isUSD=USD_CATS.includes(txF.cat);

  const donut=[
    {value:stockVal,color:"#00f0dc",label:"Stocks"},
    {value:mfVal,color:"#e040fb",label:"MF"},
    {value:goldVal,color:"#ffd700",label:"Gold"},
    {value:silverVal,color:"#c0c0c0",label:"Silver"},
    {value:bankTotal,color:"#4fc3f7",label:"Cash"},
  ];

  function addTx(){
    const amt=isUSD?Math.round(Number(txF.amountUSD)*data.usdRate):Number(txF.amount);
    if(!txF.label||!amt) return;
    const tx={id:uid(),type:txF.type,cat:txF.cat,label:txF.label,amount:amt,date:txF.date,note:txF.note};
    if(isUSD){tx.amountUSD=Number(txF.amountUSD);tx.rateUsed=data.usdRate;}
    setData(d=>({...d,transactions:[tx,...d.transactions]}));
    setShowAdd(false);
    setTxF({type:"income",cat:"T Gifts",label:"",amountUSD:"",amount:"",date:today(),note:""});
  }

  function saveBank(){
    const bankName=bankF.isNew?bankF.newName:bankF.bank;
    if(!bankName||!bankF.balance) return;
    setData(d=>{
      const idx=d.bankBalances.findIndex(b=>b.bank===bankName);
      const bbs=[...d.bankBalances];
      if(idx>=0) bbs[idx]={...bbs[idx],balance:Number(bankF.balance),updated:today()};
      else bbs.push({id:uid(),bank:bankName,balance:Number(bankF.balance),updated:today()});
      return{...d,bankBalances:bbs};
    });
    setShowBank(false); setBankF({bank:"",isNew:false,newName:"",balance:""});
  }

  const now = new Date();
  const dayName = now.toLocaleDateString("en-IN",{weekday:"long"});
  const dateStr = now.toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"});

  return(
    <div className="slide-in" style={{paddingBottom:100}}>
      <div style={{padding:"22px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          {/* Branded title */}
          <div style={{fontSize:26,fontWeight:900,lineHeight:1.15,letterSpacing:"-.01em"}}>
            <span style={{color:"#ff5370"}}>AS</span>
            <span style={{color:"rgba(255,255,255,.55)"}}>'s </span>
            <span style={{background:"linear-gradient(90deg,#00f0dc,#7c3aed,#e040fb)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>TRACKER</span>
          </div>
          {/* Live date line */}
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
            <span style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,.55)"}}>{dateStr},</span>
            <span style={{fontSize:13,fontWeight:700,color:"#00f0dc"}}>{dayName}</span>
            <span style={{fontSize:14}}>📅</span>
          </div>
        </div>
        <div onClick={()=>nav("profile")} style={{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,#00f0dc,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer",border:"2.5px solid rgba(0,240,220,.3)",flexShrink:0}}>👤</div>
      </div>

      <div style={{margin:"16px 16px 0",background:"linear-gradient(135deg,#00f0dc,#00b8d9)",borderRadius:22,padding:"20px 22px",position:"relative",overflow:"hidden"}} className="glow-cyan">
        <div style={{position:"absolute",right:-24,top:-24,width:100,height:100,borderRadius:"50%",background:"rgba(255,255,255,.1)"}}/>
        <div style={{fontSize:11,color:"rgba(0,0,0,.5)",fontWeight:700,letterSpacing:".1em"}}>NET WORTH</div>
        <div className="mono" style={{fontSize:30,fontWeight:700,color:"#000d0c",margin:"4px 0"}}>{fmtK(netWorth)}</div>
        <div style={{display:"inline-flex",background:"rgba(0,0,0,.12)",borderRadius:20,padding:"3px 10px"}}>
          <span style={{fontSize:12,color:"rgba(0,0,0,.6)"}}>↗ +2.4% this month</span>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,margin:"12px 16px 0"}}>
        <Card style={{padding:"14px 16px",textAlign:"left"}}>
          <div style={{fontSize:12,color:"rgba(255,255,255,.38)",marginBottom:4}}>↗ Income</div>
          <div className="mono" style={{fontSize:24,fontWeight:800,color:"#00f0dc"}}>{fmtK(totalIn)}</div>
        </Card>
        <Card style={{padding:"14px 16px",textAlign:"right"}}>
          <div style={{fontSize:12,color:"rgba(255,255,255,.38)",marginBottom:4}}>↙ Expenses</div>
          <div className="mono" style={{fontSize:24,fontWeight:800,color:"#ff5370"}}>{fmtK(totalOut)}</div>
        </Card>
      </div>

      <div style={{margin:"12px 16px 0"}}>
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:15,fontWeight:700}}>Investments</span>
            <button onClick={()=>nav("invest")} style={{background:"none",border:"none",color:"#00f0dc",fontSize:13,fontWeight:600}}>View →</button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <Donut data={donut} size={108} stroke={16}/>
            <div style={{flex:1}}>
              {donut.map(d=>(
                <div key={d.label} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:7,height:7,borderRadius:"50%",background:d.color}}/><span style={{fontSize:11,color:"rgba(255,255,255,.5)"}}>{d.label}</span></div>
                  <span style={{fontSize:11,color:"rgba(255,255,255,.38)"}}>{Math.round(d.value/(donut.reduce((s,x)=>s+x.value,0)||1)*100)}%</span>
                </div>
              ))}
            </div>
          </div>
        </Card>
      </div>

      <div style={{margin:"12px 16px 0"}}>
        <Card style={{background:"rgba(255,213,0,.04)",border:"1px solid rgba(255,213,0,.12)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:14,fontWeight:700}}>📊 Today's Prices</span>
            <button onClick={()=>nav("prices")} style={{background:"rgba(255,213,0,.12)",border:"none",color:"#ffd700",fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:8}}>Update</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
            {[["🥇 Gold 22K",`₹${prices.gold22k}/g`,"#ffd700"],["🥈 Silver",`₹${prices.silver999}/g`,"#c0c0c0"],["💵 USD/INR",`₹${data.usdRate}`,"#00f0dc"]].map(([l,v,c])=>(
              <div key={l} style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:"8px 9px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"rgba(255,255,255,.35)",marginBottom:3}}>{l}</div>
                <div className="mono" style={{fontSize:12,fontWeight:700,color:c}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:9,color:"rgba(255,255,255,.22)",marginTop:7}}>Last updated: {prices.lastUpdated}</div>
        </Card>
      </div>

      <div style={{padding:"14px 16px 0"}}>
        <div onClick={()=>setOpenSection(s=>s==="payments"?null:"payments")} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,83,112,.08)",border:"1px solid rgba(255,83,112,.2)",borderRadius:14,padding:"14px 16px",cursor:"pointer"}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <span style={{fontSize:18}}>{openSection==="payments"?"▾":"▸"}</span>
            <span style={{fontSize:19,fontWeight:800,color:"#ff5370"}}>Upcoming Payments</span>
          </div>
          <span style={{background:"rgba(255,83,112,.18)",color:"#ff5370",fontSize:13,fontWeight:800,padding:"4px 12px",borderRadius:20}}>{loans.length} Pending</span>
        </div>
        {openSection==="payments"&&(
          <div style={{marginTop:8}}>
            {loans.length===0&&<div style={{fontSize:12,color:"rgba(255,255,255,.3)",padding:"8px 4px"}}>No upcoming payments. Add loans in the EMI tab.</div>}
            {loans.map(l=>(
              <div key={l.id} style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:14,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:38,height:38,borderRadius:11,background:"rgba(255,255,255,.07)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🏦</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600}}>{l.label}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>Due day {l.dueDay} · {l.secured?"Secured":"Unsecured"}</div>
                </div>
                <div className="mono" style={{fontSize:14,fontWeight:700,color:l.color||"#ff5370"}}>{fmtK(l.emi)}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{padding:"10px 16px 0"}}>
        <div onClick={()=>setOpenSection(s=>s==="banks"?null:"banks")} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(79,195,247,.08)",border:"1px solid rgba(79,195,247,.2)",borderRadius:14,padding:"14px 16px",cursor:"pointer"}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <span style={{fontSize:18}}>{openSection==="banks"?"▾":"▸"}</span>
            <span style={{fontSize:19,fontWeight:800,color:"#4fc3f7"}}>Bank Balances</span>
          </div>
          <span className="mono" style={{background:"rgba(79,195,247,.18)",color:"#4fc3f7",fontSize:14,fontWeight:800,padding:"4px 12px",borderRadius:20}}>{fmtK(bankTotal)}</span>
        </div>
        {openSection==="banks"&&(
          <div style={{marginTop:8}}>
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:6}}>
              <button onClick={()=>setShowBank(true)} style={{background:"rgba(79,195,247,.12)",border:"1px solid rgba(79,195,247,.25)",color:"#4fc3f7",fontSize:12,fontWeight:700,padding:"5px 12px",borderRadius:9}}>+ Update Balance</button>
            </div>
            {bankBalances.length===0&&<div style={{fontSize:12,color:"rgba(255,255,255,.3)",padding:"8px 4px"}}>No accounts yet. Tap “+ Update Balance” to add one.</div>}
            {bankBalances.map(b=>(
              <div key={b.id} style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:13,padding:"10px 14px",marginBottom:7,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:13,fontWeight:600}}>{b.bank}</div><div style={{fontSize:10,color:"rgba(255,255,255,.28)"}}>Updated {fmtDate(b.updated)}</div></div>
                <div className="mono" style={{fontSize:14,fontWeight:700,color:"#4fc3f7"}}>{fmtK(b.balance)}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      <button onClick={()=>setShowAdd(true)} style={{position:"fixed",bottom:90,right:20,width:54,height:54,borderRadius:16,background:"linear-gradient(135deg,#00f0dc,#00b8d9)",border:"none",color:"#000",fontSize:26,fontWeight:700,zIndex:50,boxShadow:"0 8px 24px rgba(0,240,220,.45)"}}>+</button>

      {showAdd&&(
        <Modal title="Add Transaction" onClose={()=>setShowAdd(false)}>
          <TypeToggle val={txF.type} onChange={t=>setTxF(f=>({...f,type:t,cat:t==="income"?INCOME_CATS[0]:EXPENSE_CATS[0]}))}/>
          <FS label="Category" value={txF.cat} onChange={e=>setTxF(f=>({...f,cat:e.target.value}))} options={txF.type==="income"?INCOME_CATS:EXPENSE_CATS}/>
          <FI label="Date" type="date" value={txF.date} onChange={e=>setTxF(f=>({...f,date:e.target.value}))}/>
          <FI label="Description" value={txF.label} onChange={e=>setTxF(f=>({...f,label:e.target.value}))} placeholder="e.g. Tango weekly payout"/>
          {isUSD?(
            <>
              <div style={{background:"rgba(255,200,0,.07)",border:"1px solid rgba(255,200,0,.18)",borderRadius:10,padding:"10px 12px",marginBottom:10,fontSize:12,color:"rgba(255,213,0,.8)"}}>
                💱 USD income — will be converted at ₹{data.usdRate}/$
              </div>
              <FI label="Amount in USD ($)" type="number" value={txF.amountUSD} onChange={e=>setTxF(f=>({...f,amountUSD:e.target.value}))} placeholder="503"/>
              {txF.amountUSD&&<div style={{fontSize:12,color:"#00f0dc",marginBottom:8,marginTop:-6}}>= ₹{(Number(txF.amountUSD)*data.usdRate).toLocaleString("en-IN")} at ₹{data.usdRate}/$</div>}
            </>
          ):(
            <FI label="Amount (₹)" type="number" value={txF.amount} onChange={e=>setTxF(f=>({...f,amount:e.target.value}))} placeholder="0"/>
          )}
          <Btn onClick={addTx}>Add Transaction</Btn>
        </Modal>
      )}

      {showBank&&(
        <Modal title="Update Bank Balance" onClose={()=>setShowBank(false)}>
          {!bankF.isNew?(
            <>
              <FS label="Select Account" value={bankF.bank} onChange={e=>{if(e.target.value==="__new__")setBankF(f=>({...f,isNew:true}));else setBankF(f=>({...f,bank:e.target.value}));}} options={[{v:"",l:"— Choose —"},...bankBalances.map(b=>({v:b.bank,l:b.bank})),{v:"__new__",l:"+ Add New Account"}]}/>
            </>
          ):(
            <FI label="New Bank / Wallet Name" value={bankF.newName} onChange={e=>setBankF(f=>({...f,newName:e.target.value}))} placeholder="e.g. Kotak Savings"/>
          )}
          <FI label="Current Balance (₹)" type="number" value={bankF.balance} onChange={e=>setBankF(f=>({...f,balance:e.target.value}))} placeholder="0"/>
          <Btn onClick={saveBank}>Save Balance</Btn>
        </Modal>
      )}
    </div>
  );
}

// CASH FLOW — search + date range
// ══════════════════════════════════════════════════════════════════════════════
function CashFlow({data,setData}){
  const {transactions}=data;
  const [search,setSearch]=useState("");
  const [dateFrom,setDateFrom]=useState(today());
  const [dateTo,setDateTo]=useState(today());
  const [catFilter,setCatFilter]=useState("All");
  const [showAdd,setShowAdd]=useState(false);
  const [showFilters,setShowFilters]=useState(false);
  const [editTx,setEditTx]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const [txF,setTxF]=useState({type:"income",cat:"T Gifts",label:"",amountUSD:"",amount:"",date:today(),note:""});

  const isUSD=USD_CATS.includes(txF.cat);
  const isEditUSD=editTx&&USD_CATS.includes(editTx.cat);
  const allCats=["All",...new Set(transactions.map(t=>t.cat))];

  const filtered=transactions.filter(t=>{
    const q=search.toLowerCase();
    const mQ=!q||(t.label.toLowerCase().includes(q)||t.cat.toLowerCase().includes(q)||(t.note||"").toLowerCase().includes(q)||String(t.amount).includes(q)||(t.amountUSD&&String(t.amountUSD).includes(q)));
    const mF=!dateFrom||t.date>=dateFrom;
    const mT=!dateTo||t.date<=dateTo;
    const mC=catFilter==="All"||t.cat===catFilter;
    return mQ&&mF&&mT&&mC;
  });

  const totalIn=filtered.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalOut=filtered.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const hasFilters=!!(search||dateFrom||dateTo||catFilter!=="All");

  const grouped={};
  filtered.forEach(t=>{if(!grouped[t.date])grouped[t.date]=[];grouped[t.date].push(t);});
  const dates=Object.keys(grouped).sort((a,b)=>new Date(b)-new Date(a));

  function addTx(){
    const amt=isUSD?Math.round(Number(txF.amountUSD)*data.usdRate):Number(txF.amount);
    if(!txF.label||!amt) return;
    const tx={id:uid(),type:txF.type,cat:txF.cat,label:txF.label,amount:amt,date:txF.date,note:txF.note};
    if(isUSD){tx.amountUSD=Number(txF.amountUSD);tx.rateUsed=data.usdRate;}
    setData(d=>({...d,transactions:[tx,...d.transactions]}));
    setShowAdd(false);
    setTxF({type:"income",cat:"T Gifts",label:"",amountUSD:"",amount:"",date:today(),note:""});
  }

  function saveEdit(){
    const amt=isEditUSD?Math.round(Number(editTx.amountUSD)*data.usdRate):Number(editTx.amount);
    if(!editTx.label||!amt) return;
    setData(d=>({...d,transactions:d.transactions.map(t=>t.id===editTx.id?{...editTx,amount:amt}:t)}));
    setEditTx(null);
  }

  function deleteTx(id){
    setData(d=>({...d,transactions:d.transactions.filter(t=>t.id!==id)}));
    setConfirmDel(null);
  }

  return(
    <div className="slide-in" style={{paddingBottom:100}}>
      <div style={{padding:"22px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:22,fontWeight:800}}>Cash Flow</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.3)"}}>{filtered.length} of {transactions.length} transactions</div>
        </div>
        <button onClick={()=>setShowFilters(!showFilters)} style={{padding:"7px 12px",borderRadius:10,border:`1px solid ${hasFilters?"#00f0dc":"rgba(255,255,255,.1)"}`,background:hasFilters?"rgba(0,240,220,.08)":"rgba(255,255,255,.04)",color:hasFilters?"#00f0dc":"rgba(255,255,255,.45)",fontSize:13,fontWeight:600}}>
          ⚙ {hasFilters?"Filtered":"Filter"}
        </button>
      </div>

      {/* Search */}
      <div style={{padding:"12px 16px 0"}}>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"rgba(255,255,255,.28)",fontSize:15}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search label, category, amount…"
            style={{...iS,paddingLeft:36,marginBottom:0}}/>
          {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"rgba(255,255,255,.35)",fontSize:15}}>✕</button>}
        </div>
      </div>

      {/* Filter panel */}
      {showFilters&&(
        <div style={{margin:"10px 16px 0",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:14,padding:"13px"}}>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <button onClick={()=>{setDateFrom(today());setDateTo(today());}} style={{flex:1,padding:"8px",borderRadius:9,border:"none",background:(dateFrom===today()&&dateTo===today())?"#00f0dc":"rgba(255,255,255,.07)",color:(dateFrom===today()&&dateTo===today())?"#000":"rgba(255,255,255,.55)",fontSize:12,fontWeight:700}}>Today</button>
            <button onClick={()=>{setDateFrom("");setDateTo("");}} style={{flex:1,padding:"8px",borderRadius:9,border:"none",background:(!dateFrom&&!dateTo)?"#00f0dc":"rgba(255,255,255,.07)",color:(!dateFrom&&!dateTo)?"#000":"rgba(255,255,255,.55)",fontSize:12,fontWeight:700}}>All Dates</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:6}}>
            <FI label="From" type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/>
            <FI label="To" type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}/>
          </div>
          <FS label="Category" value={catFilter} onChange={e=>setCatFilter(e.target.value)} options={allCats}/>
          {(search||catFilter!=="All")&&<button onClick={()=>{setSearch("");setCatFilter("All");}} style={{background:"rgba(255,83,112,.1)",border:"1px solid rgba(255,83,112,.18)",borderRadius:9,padding:"7px 14px",color:"#ff5370",fontSize:12,fontWeight:600,width:"100%",marginTop:2}}>Clear Search & Category</button>}
        </div>
      )}

      {/* Balance */}
      <div style={{margin:"12px 16px 0"}}>
        <Card>
          <div className="mono" style={{fontSize:30,fontWeight:700,color:totalIn-totalOut>=0?"#00f0dc":"#ff5370"}}>{totalIn-totalOut>=0?"+":""}{fmt(totalIn-totalOut)}</div>
          <div style={{display:"flex",marginTop:14}}>
            <div style={{flex:1,textAlign:"center",borderRight:"1px solid rgba(255,255,255,.08)",paddingRight:8}}>
              <div style={{fontSize:11,color:"rgba(255,255,255,.38)",marginBottom:4}}>Income</div>
              <div className="mono" style={{fontSize:24,fontWeight:800,color:"#00f0dc"}}>{fmtK(totalIn)}</div>
            </div>
            <div style={{flex:1,textAlign:"center",paddingLeft:8}}>
              <div style={{fontSize:11,color:"rgba(255,255,255,.38)",marginBottom:4}}>Expenses</div>
              <div className="mono" style={{fontSize:24,fontWeight:800,color:"#ff5370"}}>{fmtK(totalOut)}</div>
            </div>
          </div>
        </Card>
      </div>

      {/* Trend chart — only when no filters active */}
      {!hasFilters&&(
        <div style={{margin:"12px 16px 0"}}>
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
              <span style={{fontSize:14,fontWeight:700}}>Monthly Trends</span>
              <span style={{fontSize:11,color:"#00f0dc",fontWeight:600}}>Last 6 Months</span>
            </div>
            <LineChart data={[18000,24000,19500,28000,24000,totalOut||12000]} labels={["Jan","Feb","Mar","Apr","May","Jun"]} color="#00f0dc" h={100}/>
          </Card>
        </div>
      )}

      {/* Category chips */}
      <div style={{padding:"10px 16px 0",display:"flex",gap:7,overflowX:"auto"}}>
        {allCats.slice(0,8).map(c=>(
          <button key={c} onClick={()=>setCatFilter(c)} style={{flexShrink:0,padding:"6px 13px",borderRadius:20,border:"none",background:catFilter===c?"#00f0dc":"rgba(255,255,255,.07)",color:catFilter===c?"#000":"rgba(255,255,255,.5)",fontSize:12,fontWeight:600}}>{c}</button>
        ))}
      </div>

      {/* Transactions */}
      <div style={{padding:"12px 16px 0"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,.4)",fontWeight:600,marginBottom:4}}>
          {(dateFrom===today()&&dateTo===today())?"Showing: Today":(!dateFrom&&!dateTo)?"Showing: All dates":`Showing: ${dateFrom?fmtDate(dateFrom):"start"} → ${dateTo?fmtDate(dateTo):"now"}`}
          {`  ·  ${filtered.length} ${filtered.length===1?"entry":"entries"}`}
        </div>
        {filtered.length===0&&(
          <div style={{textAlign:"center",padding:"36px 18px",color:"rgba(255,255,255,.3)",fontSize:14}}>
            {(dateFrom===today()&&dateTo===today())
              ? "No transactions today yet. Tap + to add one, or open the filter to view other dates."
              : "No transactions in this range. Try the filter to change dates."}
          </div>
        )}
        {dates.map(date=>(
          <div key={date}>
            <div style={{fontSize:10,color:"rgba(255,255,255,.28)",fontWeight:600,letterSpacing:".07em",textTransform:"uppercase",marginBottom:6,marginTop:12}}>{fmtDate(date)}</div>
            {grouped[date].map((t,i)=>{
              const isIn=t.type==="income";
              const c=isIn?"#00f0dc":"#ff5370";
              return(
                <div key={t.id} className="fade-up" style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:13,padding:"11px 13px",marginBottom:7,animationDelay:`${i*.04}s`}}>
                  <div style={{display:"flex",alignItems:"center",gap:11}}>
                    <div style={{width:36,height:36,borderRadius:10,background:`rgba(${isIn?"0,240,220":"255,83,112"},.1)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>{isIn?"💰":"💸"}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.label}</div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,.28)"}}>{t.cat}{t.note?` · ${t.note}`:""}{t.amountUSD?` · $${t.amountUSD}`:""}</div>
                    </div>
                    <div className="mono" style={{fontSize:14,fontWeight:700,color:c,flexShrink:0}}>{isIn?"+":"-"}{fmtK(t.amount)}</div>
                  </div>
                  <ActionBar onEdit={()=>setEditTx({...t,amount:String(t.amount),amountUSD:String(t.amountUSD||"")})} onDelete={()=>setConfirmDel(t)}/>
                </div>
              );
            })}
          </div>
        ))}
      </div>

      <button onClick={()=>setShowAdd(true)} style={{position:"fixed",bottom:90,right:20,display:"flex",alignItems:"center",gap:7,padding:"12px 18px",borderRadius:18,background:"linear-gradient(135deg,#00f0dc,#00b8d9)",border:"none",color:"#000",fontSize:14,fontWeight:700,zIndex:50,boxShadow:"0 8px 22px rgba(0,240,220,.38)"}}>+ Add</button>

      {showAdd&&(
        <Modal title="Add Transaction" onClose={()=>setShowAdd(false)}>
          <TypeToggle val={txF.type} onChange={t=>setTxF(f=>({...f,type:t,cat:t==="income"?INCOME_CATS[0]:EXPENSE_CATS[0]}))}/>
          <FS label="Category" value={txF.cat} onChange={e=>setTxF(f=>({...f,cat:e.target.value}))} options={txF.type==="income"?INCOME_CATS:EXPENSE_CATS}/>
          <FI label="Date" type="date" value={txF.date} onChange={e=>setTxF(f=>({...f,date:e.target.value}))}/>
          <FI label="Description" value={txF.label} onChange={e=>setTxF(f=>({...f,label:e.target.value}))} placeholder="Description"/>
          {isUSD?(
            <>
              <div style={{background:"rgba(255,200,0,.07)",border:"1px solid rgba(255,200,0,.18)",borderRadius:10,padding:"9px 12px",marginBottom:10,fontSize:12,color:"rgba(255,213,0,.75)"}}>
                💱 Converts at ₹{data.usdRate}/$
              </div>
              <FI label="Amount in USD ($)" type="number" value={txF.amountUSD} onChange={e=>setTxF(f=>({...f,amountUSD:e.target.value}))} placeholder="503"/>
              {txF.amountUSD&&<div style={{fontSize:12,color:"#00f0dc",marginBottom:8,marginTop:-6}}>= ₹{(Number(txF.amountUSD)*data.usdRate).toLocaleString("en-IN")}</div>}
            </>
          ):(
            <FI label="Amount (₹)" type="number" value={txF.amount} onChange={e=>setTxF(f=>({...f,amount:e.target.value}))} placeholder="0"/>
          )}
          <Btn onClick={addTx}>Add Transaction</Btn>
        </Modal>
      )}

      {/* Edit Transaction Modal */}
      {editTx&&(
        <Modal title="✏ Edit Transaction" onClose={()=>setEditTx(null)}>
          <TypeToggle val={editTx.type} onChange={t=>setEditTx(f=>({...f,type:t,cat:t==="income"?INCOME_CATS[0]:EXPENSE_CATS[0]}))}/>
          <FS label="Category" value={editTx.cat} onChange={e=>setEditTx(f=>({...f,cat:e.target.value}))} options={editTx.type==="income"?INCOME_CATS:EXPENSE_CATS}/>
          <FI label="Date" type="date" value={editTx.date} onChange={e=>setEditTx(f=>({...f,date:e.target.value}))}/>
          <FI label="Description" value={editTx.label} onChange={e=>setEditTx(f=>({...f,label:e.target.value}))}/>
          {isEditUSD?(
            <>
              <FI label="Amount in USD ($)" type="number" value={editTx.amountUSD} onChange={e=>setEditTx(f=>({...f,amountUSD:e.target.value}))}/>
              {editTx.amountUSD&&<div style={{fontSize:12,color:"#00f0dc",marginBottom:8,marginTop:-6}}>= ₹{(Number(editTx.amountUSD)*data.usdRate).toLocaleString("en-IN")}</div>}
            </>
          ):(
            <FI label="Amount (₹)" type="number" value={editTx.amount} onChange={e=>setEditTx(f=>({...f,amount:e.target.value}))}/>
          )}
          <Btn onClick={saveEdit}>Save Changes</Btn>
        </Modal>
      )}

      {confirmDel&&<ConfirmDelete label={`"${confirmDel.label}" — ${fmtK(confirmDel.amount)}`} onConfirm={()=>deleteTx(confirmDel.id)} onCancel={()=>setConfirmDel(null)}/>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// INVESTMENTS
// ══════════════════════════════════════════════════════════════════════════════
function Investments({data,setData}){
  const {stocks,mfs,metalSchemes,physicalGold,physicalSilver,prices}=data;
  const [tab,setTab]=useState("stocks");
  const [showAdd,setShowAdd]=useState(false);
  const [showScheme,setShowScheme]=useState(null);
  const [showNav,setShowNav]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [importMode,setImportMode]=useState("paste");
  const [importText,setImportText]=useState("");
  const [importRows,setImportRows]=useState([]);
  const [importError,setImportError]=useState("");
  const [manualRows,setManualRows]=useState([{symbol:"",name:"",qty:"",avgPrice:"",sector:"Other"}]);
  const [aF,setAF]=useState({sub:"stocks",symbol:"",name:"",qty:"",avgPrice:"",currentPrice:"",sector:"Tech",mfName:"",invested:"",nav:"",units:"",mfCat:"Equity",sLabel:"",metal:"gold",purity:"22K",sMonthly:"",pmMetal:"gold",pmDate:today(),pmItem:"",pmVendor:"",pmPurity:"22K",pmGrams:"",pmValue:""});
  const [instF,setInstF]=useState({month:today().slice(0,7),amountPaid:"",gramsAllotted:""});
  const [showSip,setShowSip]=useState(null); // fund id for monthly SIP entry
  const [sipF,setSipF]=useState({month:today().slice(0,7),amount:"",nav:""});
  const [navU,setNavU]=useState({});
  const [sortBy,setSortBy]=useState("value"); // value | name | gain
  const [query,setQuery]=useState(""); // filter holdings by name/ticker
  // edit/delete state
  const [editStock,setEditStock]=useState(null);
  const [editMF,setEditMF]=useState(null);
  const [editScheme,setEditScheme]=useState(null);
  const [editPhysGold,setEditPhysGold]=useState(null);
  const [editPhysSilver,setEditPhysSilver]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null); // {type,id,label}
  const [openCard,setOpenCard]=useState(null); // "stock-12" | "mf-3" | "scheme-1" | "pg-1" | "ps-1" — tap to reveal edit/delete
  const tapToggle=(key)=>setOpenCard(c=>c===key?null:key);

  const stockVal=stocks.reduce((s,st)=>s+st.qty*st.currentPrice,0);
  const stockCost=stocks.reduce((s,st)=>s+st.qty*st.avgPrice,0);
  const mfVal=mfs.reduce((s,m)=>s+mfUnits(m)*m.currentNAV,0);
  const mfCost=mfs.reduce((s,m)=>s+mfInvested(m),0);
  const goldG=metalSchemes.filter(s=>s.metal==="gold").reduce((s,sc)=>s+sc.installments.reduce((a,i)=>a+i.gramsAllotted,0),0);
  const silverG=metalSchemes.filter(s=>s.metal==="silver").reduce((s,sc)=>s+sc.installments.reduce((a,i)=>a+i.gramsAllotted,0),0);
  const physGoldG=(physicalGold||[]).reduce((s,p)=>s+p.grams,0);
  const physGoldCost=(physicalGold||[]).reduce((s,p)=>s+p.purchaseValue,0);
  const physSilverG=(physicalSilver||[]).reduce((s,p)=>s+p.grams,0);
  const physSilverCost=(physicalSilver||[]).reduce((s,p)=>s+p.purchaseValue,0);
  const goldVal=(goldG+physGoldG)*prices.gold22k;
  const silverVal=(silverG+physSilverG)*prices.silver999;
  const metalCost=metalSchemes.reduce((s,sc)=>s+sc.installments.reduce((a,i)=>a+i.amountPaid,0),0)+physGoldCost+physSilverCost;
  const totalVal=stockVal+mfVal+goldVal+silverVal;
  const totalProfit=(stockVal-stockCost)+(mfVal-mfCost)+(goldVal+silverVal-metalCost);

  function addStock(){
    if(!aF.symbol||!aF.qty) return;
    setData(d=>({...d,stocks:[...d.stocks,{id:uid(),symbol:aF.symbol.toUpperCase(),name:aF.name||aF.symbol,qty:Number(aF.qty),avgPrice:Number(aF.avgPrice||0),currentPrice:Number(aF.currentPrice||aF.avgPrice||0),sector:aF.sector}]}));
    setShowAdd(false);
  }
  function addMF(){
    if(!aF.mfName) return;
    setData(d=>({...d,mfs:[...d.mfs,{id:uid(),name:aF.mfName,invested:Number(aF.invested||0),currentNAV:Number(aF.nav||0),units:Number(aF.units||0),category:aF.mfCat,sips:[]}]}));
    setShowAdd(false);
  }
  function addScheme(){
    if(!aF.sLabel) return;
    setData(d=>({...d,metalSchemes:[...d.metalSchemes,{id:uid(),label:aF.sLabel,metal:aF.metal,purity:aF.purity,monthlyAmount:Number(aF.sMonthly||0),installments:[]}]}));
    setShowAdd(false);
  }
  function addPhysicalGold(){
    if(!aF.pmItem||!aF.pmGrams||!aF.pmValue) return;
    setData(d=>({...d,physicalGold:[...(d.physicalGold||[]),{id:uid(),date:aF.pmDate,item:aF.pmItem,vendor:aF.pmVendor,purity:aF.pmPurity,grams:Number(aF.pmGrams),purchaseValue:Number(aF.pmValue)}]}));
    setShowAdd(false);
  }
  function addPhysicalSilver(){
    if(!aF.pmItem||!aF.pmGrams||!aF.pmValue) return;
    setData(d=>({...d,physicalSilver:[...(d.physicalSilver||[]),{id:uid(),date:aF.pmDate,item:aF.pmItem,vendor:aF.pmVendor,purity:aF.pmPurity,grams:Number(aF.pmGrams),purchaseValue:Number(aF.pmValue)}]}));
    setShowAdd(false);
  }
  function addInstallment(sid){
    const sc=metalSchemes.find(s=>s.id===sid);
    const amt=sc&&sc.monthlyAmount?sc.monthlyAmount:Number(instF.amountPaid||0);
    if(!instF.gramsAllotted) return;
    setData(d=>({...d,metalSchemes:d.metalSchemes.map(s=>s.id===sid?{...s,installments:[...s.installments,{month:instF.month,amountPaid:amt,gramsAllotted:Number(instF.gramsAllotted)}]}:s)}));
    setShowScheme(null);
    setInstF({month:today().slice(0,7),amountPaid:"",gramsAllotted:""});
  }
  function saveNav(){
    const updatedToday=today();
    setData(d=>({...d,
      stocks:d.stocks.map(s=>navU[`s${s.id}`]?{...s,currentPrice:Number(navU[`s${s.id}`]),priceUpdated:updatedToday}:s),
      mfs:d.mfs.map(m=>navU[`m${m.id}`]?{...m,currentNAV:Number(navU[`m${m.id}`]),navUpdated:updatedToday}:m),
    }));
    setShowNav(false); setNavU({});
  }

  function saveEditStock(){
    if(!editStock.symbol||!editStock.qty) return;
    setData(d=>({...d,stocks:d.stocks.map(s=>s.id===editStock.id?{...s,...editStock,qty:Number(editStock.qty),avgPrice:Number(editStock.avgPrice),currentPrice:Number(editStock.currentPrice||editStock.avgPrice)}:s)}));
    setEditStock(null);
  }
  function saveEditMF(){
    if(!editMF.name) return;
    const sips=(editMF.sips||[]).map(x=>{ const amount=Number(x.amount||0), nav=Number(x.nav||0); return {month:x.month,amount,nav,units:nav>0?amount/nav:Number(x.units||0)}; });
    setData(d=>({...d,mfs:d.mfs.map(m=>m.id===editMF.id?{...m,name:editMF.name,category:editMF.category,currentNAV:Number(editMF.currentNAV),invested:Number(editMF.invested||0),units:Number(editMF.units||0),sips}:m)}));
    setEditMF(null);
  }
  function addSip(fid){
    const amount=Number(sipF.amount||0), nav=Number(sipF.nav||0);
    if(!amount||!nav) return;
    const units=amount/nav;
    setData(d=>({...d,mfs:d.mfs.map(m=>m.id===fid?{...m,sips:[...(m.sips||[]),{month:sipF.month,amount,nav,units}]}:m)}));
    setShowSip(null);
    setSipF({month:today().slice(0,7),amount:"",nav:""});
  }
  function saveEditPhysGold(){
    if(!editPhysGold.item||!editPhysGold.grams) return;
    setData(d=>({...d,physicalGold:(d.physicalGold||[]).map(p=>p.id===editPhysGold.id?{...p,...editPhysGold,grams:Number(editPhysGold.grams),purchaseValue:Number(editPhysGold.purchaseValue)}:p)}));
    setEditPhysGold(null);
  }
  function saveEditPhysSilver(){
    if(!editPhysSilver.item||!editPhysSilver.grams) return;
    setData(d=>({...d,physicalSilver:(d.physicalSilver||[]).map(p=>p.id===editPhysSilver.id?{...p,...editPhysSilver,grams:Number(editPhysSilver.grams),purchaseValue:Number(editPhysSilver.purchaseValue)}:p)}));
    setEditPhysSilver(null);
  }
  function doDelete(){
    if(!confirmDel) return;
    const {type,id}=confirmDel;
    if(type==="stock") setData(d=>({...d,stocks:d.stocks.filter(s=>s.id!==id)}));
    else if(type==="mf") setData(d=>({...d,mfs:d.mfs.filter(m=>m.id!==id)}));
    else if(type==="physGold") setData(d=>({...d,physicalGold:(d.physicalGold||[]).filter(p=>p.id!==id)}));
    else if(type==="physSilver") setData(d=>({...d,physicalSilver:(d.physicalSilver||[]).filter(p=>p.id!==id)}));
    else if(type==="scheme") setData(d=>({...d,metalSchemes:d.metalSchemes.filter(s=>s.id!==id)}));
    setConfirmDel(null);
  }

  // ── CSV / text parser ─────────────────────────────────────────────────────
  function parseImportText(raw){
    setImportError("");
    const lines=raw.trim().split(/\r?\n/).filter(l=>l.trim());
    if(!lines.length){ setImportRows([]); return; }
    // auto-detect delimiter: comma or tab
    const delim=lines[0].includes("\t")?"\t":",";
    // skip header row if first cell is non-numeric / looks like a header
    const firstCell=lines[0].split(delim)[0].trim().toLowerCase();
    const hasHeader=/symbol|name|company|stock|share|scrip/.test(firstCell);
    const dataLines=hasHeader?lines.slice(1):lines;
    const rows=[];
    dataLines.forEach((line,i)=>{
      const cells=line.split(delim).map(c=>c.trim().replace(/^"|"$/g,""));
      // flexible column detection — try common orderings
      // Expected: Symbol, Name, Qty, AvgPrice  OR  Name, Symbol, Qty, AvgPrice etc.
      if(cells.length<2){ return; }
      let symbol="",name="",qty=0,avgPrice=0,sector="Other";
      if(cells.length>=4){
        // assume: Symbol, Name, Qty, AvgPrice
        symbol=cells[0].toUpperCase();
        name=cells[1]||symbol;
        qty=Number(cells[2].replace(/,/g,""));
        avgPrice=Number(cells[3].replace(/,/g,""));
        sector=cells[4]||"Other";
      } else if(cells.length===3){
        // Symbol/Name, Qty, AvgPrice
        symbol=cells[0].toUpperCase();
        name=cells[0];
        qty=Number(cells[1].replace(/,/g,""));
        avgPrice=Number(cells[2].replace(/,/g,""));
      } else if(cells.length===2){
        symbol=cells[0].toUpperCase();
        name=cells[0];
        qty=Number(cells[1].replace(/,/g,""));
      }
      if(!symbol||isNaN(qty)||qty<=0){ return; }
      if(isNaN(avgPrice)||avgPrice<0) avgPrice=0;
      rows.push({symbol,name:name||symbol,qty,avgPrice,sector,currentPrice:avgPrice});
    });
    if(!rows.length){ setImportError("No valid rows found. Check the format and try again."); }
    setImportRows(rows);
  }

  function commitImport(){
    const newStocks=importRows.map(r=>({...r,id:uid()}));
    setData(d=>({...d,stocks:[...d.stocks,...newStocks]}));
    setShowImport(false);
    setImportText(""); setImportRows([]); setImportError("");
    setTab("stocks");
  }

  function commitManual(){
    const valid=manualRows.filter(r=>r.symbol&&r.qty);
    if(!valid.length) return;
    const newStocks=valid.map(r=>({id:uid(),symbol:r.symbol.toUpperCase(),name:r.name||r.symbol,qty:Number(r.qty),avgPrice:Number(r.avgPrice||0),currentPrice:Number(r.avgPrice||0),sector:r.sector||"Other"}));
    setData(d=>({...d,stocks:[...d.stocks,...newStocks]}));
    setShowImport(false);
    setManualRows([{symbol:"",name:"",qty:"",avgPrice:"",sector:"Other"}]);
    setTab("stocks");
  }

  // Tab-aware summary (hero + two cards reflect the active tab)
  const heroVal = tab==="stocks"?stockVal : tab==="mf"?mfVal : (goldVal+silverVal);
  const heroProfit = tab==="stocks"?(stockVal-stockCost) : tab==="mf"?(mfVal-mfCost) : (goldVal+silverVal-metalCost);
  const card3 = tab==="metals"
    ? {label:"Gold Holdings", value:(goldG+physGoldG).toFixed(1)+"g", color:"#ffd700"}
    : {label:"Invested", value:fmtK(tab==="stocks"?stockCost:mfCost), color:"#4fc3f7"};

  // Sort + filter helpers for Stocks & Funds
  const q=query.trim().toLowerCase();
  function sortList(arr,valOf,nameOf,gainPctOf){
    const a=[...arr];
    if(sortBy==="name") a.sort((x,y)=>nameOf(x).localeCompare(nameOf(y)));
    else if(sortBy==="gain") a.sort((x,y)=>gainPctOf(y)-gainPctOf(x));
    else a.sort((x,y)=>valOf(y)-valOf(x));
    return a;
  }
  const stocksView=sortList(
    stocks.filter(s=>!q||s.symbol.toLowerCase().includes(q)||(s.name||"").toLowerCase().includes(q)),
    s=>s.qty*s.currentPrice, s=>s.symbol, s=>((s.currentPrice-s.avgPrice)/(s.avgPrice||1))
  );
  const mfsView=sortList(
    mfs.filter(m=>!q||(m.name||"").toLowerCase().includes(q)),
    m=>mfUnits(m)*m.currentNAV, m=>m.name, m=>((mfUnits(m)*m.currentNAV-mfInvested(m))/(mfInvested(m)||1))
  );

  // Metals groups
  const goldSchemes=metalSchemes.filter(s=>s.metal==="gold");
  const silverSchemes=metalSchemes.filter(s=>s.metal==="silver");
  function GroupHead({icon,title,total,color}){
    return(
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"16px 0 9px"}}>
        <div style={{fontSize:12,fontWeight:800,color:color,letterSpacing:".05em",textTransform:"uppercase"}}>{icon} {title}</div>
        <div className="mono" style={{fontSize:11,color:color,opacity:.85}}>{total}</div>
      </div>
    );
  }
  function briefLine(parts,accent){
    return(
      <div style={{display:"flex",gap:8,flexWrap:"wrap",fontSize:11,marginTop:5}}>
        {parts.map(([l,v],i)=>(
          <span key={i} style={{color:"rgba(255,255,255,.4)"}}>{l} <span className="mono" style={{color:accent,fontWeight:700}}>{v}</span></span>
        ))}
      </div>
    );
  }
  function physCard(p,metal){
    const price=metal==="gold"?prices.gold22k:prices.silver999;
    const accent=metal==="gold"?"#ffd700":"#c0c0c0";
    const curVal=p.grams*price, gain=curVal-p.purchaseValue, pos=gain>=0;
    const key=(metal==="gold"?"pg-":"ps-")+p.id, open=openCard===key;
    const rgba=metal==="gold"?"255,213,0":"192,192,192";
    return(
      <div key={p.id} className="fade-up" onClick={()=>tapToggle(key)} style={{background:`rgba(${rgba},.04)`,border:`1px solid rgba(${rgba},${open?".3":".14"})`,borderRadius:13,padding:"11px 13px",marginBottom:8,cursor:"pointer"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:700,color:accent}}>{p.item}</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,.32)",marginTop:1}}>{p.vendor||"—"} · {fmtDate(p.date)} · {p.purity}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0,marginLeft:10}}>
            <div className="mono" style={{fontSize:13,fontWeight:700}}>{fmtK(curVal)}</div>
            <div style={{fontSize:9,color:pos?"#00f0dc":"#ff5370"}}>{pos?"▲":"▼"} {fmtK(Math.abs(gain))}</div>
          </div>
        </div>
        {briefLine([["Qty",p.grams+"g"],["Cost",fmtK(p.purchaseValue)],["Value",fmtK(curVal)]],accent)}
        {open&&(
          <div onClick={e=>e.stopPropagation()}>
            <ActionBar
              onEdit={()=> metal==="gold"
                ? setEditPhysGold({...p,grams:String(p.grams),purchaseValue:String(p.purchaseValue)})
                : setEditPhysSilver({...p,grams:String(p.grams),purchaseValue:String(p.purchaseValue)})}
              onDelete={()=>setConfirmDel({type:metal==="gold"?"physGold":"physSilver",id:p.id,label:p.item})}/>
          </div>
        )}
      </div>
    );
  }
  function schemeCard(sc){
    const accent=sc.metal==="gold"?"#ffd700":"#c0c0c0";
    const rgba=sc.metal==="gold"?"255,213,0":"192,192,192";
    const tG=sc.installments.reduce((s,i)=>s+i.gramsAllotted,0);

                <FS label="Purity" value={aF.purity} onChange={e=>setAF(f=>({...f,purity:e.target.value}))} options={aF.pmMetal==="gold"?["24K","22K","18K"]:["999","925","800"]}/>

            {/* PHYSICAL PURCHASE FORM */}
            {aF.metalsType==="physical"&&(<>
              <FI label="Purchase Date" type="date" value={aF.pmDate} onChange={e=>setAF(f=>({...f,pmDate:e.target.value}))}/>
              <FI label="Item Description" value={aF.pmItem} onChange={e=>setAF(f=>({...f,pmItem:e.target.value}))} placeholder={aF.pmMetal==="gold"?"e.g. Gold Ring, Bangle, Coin":"e.g. Silver Coins, Anklets, Bar"}/>
              <FI label="Vendor / Jeweller Name" value={aF.pmVendor} onChange={e=>setAF(f=>({...f,pmVendor:e.target.value}))} placeholder={aF.pmMetal==="gold"?"e.g. Tanishq, GRT":"e.g. MMTC-PAMP"}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <FS label="Purity" value={aF.pmPurity} onChange={e=>setAF(f=>({...f,pmPurity:e.target.value}))} options={aF.pmMetal==="gold"?["24K","22K","18K","14K"]:["999","925","800"]}/>
                <FI label="Weight (grams)" type="number" step="0.001" value={aF.pmGrams} onChange={e=>setAF(f=>({...f,pmGrams:e.target.value}))} placeholder={aF.pmMetal==="gold"?"8.5":"50"}/>
              </div>
              <FI label="Purchase Value (₹)" type="number" value={aF.pmValue} onChange={e=>setAF(f=>({...f,pmValue:e.target.value}))} placeholder={aF.pmMetal==="gold"?"55000":"4200"}/>
              {aF.pmGrams&&aF.pmValue&&(()=>{
                const curP=aF.pmMetal==="gold"?data.prices.gold22k:data.prices.silver999;
                const curV=Number(aF.pmGrams)*curP;
                const pctChg=((curV-Number(aF.pmValue))/Number(aF.pmValue)*100).toFixed(1);
                const col=aF.pmMetal==="gold"?"#ffd700":"#c0c0c0";
                return(
                  <div style={{background:"rgba(0,240,220,.06)",border:"1px solid rgba(0,240,220,.14)",borderRadius:9,padding:"9px 12px",marginBottom:10,fontSize:12,color:"rgba(0,240,220,.8)"}}>

                    {" "}· <span style={{color:Number(pctChg)>=0?"#00f0dc":"#ff5370"}}>{Number(pctChg)>=0?"+":""}{pctChg}% since purchase</span>

              <Btn onClick={aF.pmMetal==="gold"?addPhysicalGold:addPhysicalSilver} col={aF.pmMetal==="gold"?"#ffd700":"#c0c0c0"} tc="#000">Save Physical {aF.pmMetal==="gold"?"Gold":"Silver"} Entry</Btn>
            </>)}
          </>)}
        </Modal>

      {showScheme&&(()=>{

        return(
        <Modal title="Add Monthly Installment" onClose={()=>setShowScheme(null)}>
          <div style={{background:`rgba(${rgba},.06)`,border:`1px solid rgba(${rgba},.14)`,borderRadius:9,padding:"9px 11px",marginBottom:12,fontSize:12,color:`rgba(${rgba},.85)`}}>

          </div>
          <FI label="Month" type="month" value={instF.month} onChange={e=>setInstF(f=>({...f,month:e.target.value}))}/>
          <FI label="Grams Allotted" type="number" step="0.001" value={instF.gramsAllotted} onChange={e=>setInstF(f=>({...f,gramsAllotted:e.target.value}))} placeholder="2.05"/>

        </Modal>
        );
      })()}

      {showSip&&(()=>{
        const f=mfs.find(x=>x.id===showSip);
        const amt=Number(sipF.amount||0), nav=Number(sipF.nav||0);
        const units=nav>0?amt/nav:0;
        return(
        <Modal title="Add Monthly SIP" onClose={()=>setShowSip(null)}>
          <div style={{background:"rgba(224,64,251,.06)",border:"1px solid rgba(224,64,251,.16)",borderRadius:9,padding:"9px 11px",marginBottom:12,fontSize:12,color:"rgba(224,64,251,.85)"}}>

          </div>
          <FI label="Month" type="month" value={sipF.month} onChange={e=>setSipF(v=>({...v,month:e.target.value}))}/>

            <FI label="Amount Paid (₹)" type="number" value={sipF.amount} onChange={e=>setSipF(v=>({...v,amount:e.target.value}))} placeholder="5000"/>

          </div>
          {amt>0&&nav>0&&(
            <div style={{background:"rgba(0,240,220,.06)",border:"1px solid rgba(0,240,220,.14)",borderRadius:9,padding:"9px 12px",marginBottom:10,fontSize:12,color:"rgba(0,240,220,.85)"}}>

            </div>

        </Modal>

      })()}

      {showNav&&(()=>{

        const allStocksUpdated=stocks.every(s=>s.priceUpdated===todayStr);

        const alreadyDone=allStocksUpdated&&allMFsUpdated;
        return(
          <Modal title="📈 Daily Market Update" onClose={()=>{setShowNav(false);setNavU({});}}>

            {/* Status banner */}
            {alreadyDone?(
              <div style={{background:"rgba(0,200,120,.08)",border:"1px solid rgba(0,200,120,.25)",borderRadius:12,padding:"12px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>✅</span>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:"#00c878"}}>All prices updated today</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,.38)"}}>Come back tomorrow to enter new market prices.</div>
                </div>
              </div>
            ):(
              <div style={{background:"rgba(255,213,0,.07)",border:"1px solid rgba(255,213,0,.2)",borderRadius:12,padding:"12px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>📅</span>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:"#ffd700"}}>Enter today's market prices</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,.38)"}}>Once saved, values lock for today. Leave blank to keep existing.</div>

              </div>

              return(
                <div key={s.id} style={{marginBottom:10,background:"rgba(255,255,255,.03)",border:`1px solid ${updatedToday?"rgba(0,200,120,.2)":"rgba(255,255,255,.07)"}`,borderRadius:12,padding:"10px 12px"}}>

                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontSize:11,color:"rgba(255,255,255,.35)",flexShrink:0}}>Prev: <span className="mono" style={{color:"rgba(255,255,255,.55)"}}>₹{s.currentPrice}</span></div>

                      type="number"
                      placeholder={updatedToday?"Already updated today":"Enter CMP"}
                      disabled={updatedToday}
                      value={navU[`s${s.id}`]||""}

                      style={{...iS,flex:1,marginBottom:0,textAlign:"right",opacity:updatedToday?.4:1,cursor:updatedToday?"not-allowed":"text",

                        background:updatedToday?"rgba(0,200,120,.05)":"rgba(255,255,255,.06)"}}/>

                    const diff=Number(navU[`s${s.id}`])-s.currentPrice;

                  })()}

                      style={{...iS,flex:1,marginBottom:0,textAlign:"right",opacity:updatedToday?.4:1,cursor:updatedToday?"not-allowed":"text",
                        border:`1px solid ${updatedToday?"rgba(0,200,120,.15)":"rgba(255,255,255,.1)"}`,
                        background:updatedToday?"rgba(0,200,120,.05)":"rgba(255,255,255,.06)"}}/>
                  </div>
                  {navU[`m${m.id}`]&&(()=>{
                    const diff=Number(navU[`m${m.id}`])-m.currentNAV;
                    const pct=(diff/m.currentNAV*100).toFixed(2);
                    return <div style={{fontSize:10,color:diff>=0?"#00f0dc":"#ff5370",marginTop:4,textAlign:"right"}}>{diff>=0?"▲":"▼"} {diff>=0?"+":""}{diff.toFixed(4)} ({pct}%)</div>;
                  })()}
                </div>
              );
            })}

            {!alreadyDone&&<Btn onClick={saveNav} style={{marginTop:6}}>✅ Save Today's Prices</Btn>}
            {alreadyDone&&<Btn onClick={()=>{setShowNav(false);setNavU({});}} col="#333" tc="rgba(255,255,255,.5)" style={{marginTop:6,cursor:"default"}}>Locked — Updated Today</Btn>}
          </Modal>

      })()}

      {/* ── IMPORT MODAL ───────────────────────────────────────────────── */}
      {showImport&&(
        <Modal title="⬆ Bulk Import Stocks" onClose={()=>{setShowImport(false);setImportText("");setImportRows([]);setImportError("");}}>

          {/* Mode tabs */}
          <div style={{display:"flex",gap:6,marginBottom:16}}>
            {[["paste","📋 Paste CSV"],["file","📁 Upload File"],["manual","✏ Manual Entry"]].map(([m,l])=>(
              <button key={m} onClick={()=>{setImportMode(m);setImportRows([]);setImportError("");}}
                style={{flex:1,padding:"8px 4px",borderRadius:10,border:"none",background:importMode===m?"rgba(124,58,237,.25)":"rgba(255,255,255,.06)",color:importMode===m?"#c084fc":"rgba(255,255,255,.4)",fontWeight:700,fontSize:11}}>{l}</button>
            ))}
          </div>

          {/* ── PASTE MODE ── */}
          {importMode==="paste"&&(<>
            <div style={{background:"rgba(124,58,237,.07)",border:"1px solid rgba(124,58,237,.2)",borderRadius:10,padding:"10px 12px",marginBottom:12,fontSize:11,color:"rgba(192,132,252,.8)",lineHeight:1.7}}>
              Paste from Excel, Google Sheets, or any CSV. Accepted column order (with or without header row):<br/>
              <span style={{fontFamily:"JetBrains Mono",color:"#c084fc"}}>Symbol, Company Name, Qty, Avg Price, Sector</span><br/>
              Minimum required: <span style={{fontFamily:"JetBrains Mono",color:"#c084fc"}}>Symbol, Qty, Avg Price</span>
            </div>
            <textarea
              value={importText}
              onChange={e=>{setImportText(e.target.value);parseImportText(e.target.value);}}
              placeholder={"RELIANCE,Reliance Industries,10,2850,Energy\nINFY,Infosys Ltd,15,1450,Tech\nITC,ITC Ltd,267,300,FMCG"}
              style={{...iS,height:160,resize:"none",fontFamily:"JetBrains Mono",fontSize:12,lineHeight:1.6,marginBottom:8}}
            />
          </>)}

          {/* ── FILE MODE ── */}
          {importMode==="file"&&(<>
            <div style={{background:"rgba(124,58,237,.07)",border:"1px solid rgba(124,58,237,.2)",borderRadius:10,padding:"10px 12px",marginBottom:12,fontSize:11,color:"rgba(192,132,252,.8)",lineHeight:1.7}}>
              Upload a <strong>.csv</strong> or <strong>.txt</strong> file. Same column format applies:<br/>
              <span style={{fontFamily:"JetBrains Mono",color:"#c084fc"}}>Symbol, Name, Qty, Avg Price, Sector</span>
            </div>
            <label style={{display:"block",border:"2px dashed rgba(124,58,237,.35)",borderRadius:12,padding:"28px 20px",textAlign:"center",cursor:"pointer",marginBottom:12,background:"rgba(124,58,237,.05)"}}>
              <div style={{fontSize:28,marginBottom:8}}>📁</div>
              <div style={{fontSize:13,color:"#c084fc",fontWeight:600}}>Tap to choose file</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.3)",marginTop:4}}>CSV or TXT accepted</div>
              <input type="file" accept=".csv,.txt" style={{display:"none"}} onChange={e=>{
                const file=e.target.files[0];
                if(!file) return;
                const reader=new FileReader();
                reader.onload=ev=>{
                  const text=ev.target.result;
                  setImportText(text);
                  parseImportText(text);
                };
                reader.readAsText(file);
              }}/>
            </label>
            {importText&&<div style={{fontSize:11,color:"#00c878",marginBottom:8}}>✓ File loaded — {importText.trim().split("\n").length} lines detected</div>}
          </>)}

          {/* ── MANUAL MODE ── */}
          {importMode==="manual"&&(<>
            <div style={{background:"rgba(124,58,237,.07)",border:"1px solid rgba(124,58,237,.2)",borderRadius:10,padding:"10px 12px",marginBottom:12,fontSize:11,color:"rgba(192,132,252,.8)"}}>
              Fill in each row. Symbol and Qty are required. Add rows as needed.
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1.2fr 1.5fr 0.8fr 0.8fr 0.7fr 28px",gap:5,marginBottom:6}}>
              {["Symbol","Company","Qty","Avg ₹","Sector",""].map(h=>(
                <div key={h} style={{fontSize:9,color:"rgba(255,255,255,.35)",fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",padding:"0 2px"}}>{h}</div>
              ))}
            </div>
            <div style={{maxHeight:260,overflowY:"auto"}}>
              {manualRows.map((row,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"1.2fr 1.5fr 0.8fr 0.8fr 0.7fr 28px",gap:5,marginBottom:6,alignItems:"center"}}>
                  <input value={row.symbol} onChange={e=>setManualRows(r=>{const n=[...r];n[i]={...n[i],symbol:e.target.value};return n;})} placeholder="INFY" style={{...iS,marginBottom:0,fontSize:12,padding:"8px 8px",textTransform:"uppercase"}}/>
                  <input value={row.name} onChange={e=>setManualRows(r=>{const n=[...r];n[i]={...n[i],name:e.target.value};return n;})} placeholder="Infosys Ltd" style={{...iS,marginBottom:0,fontSize:12,padding:"8px 8px"}}/>
                  <input type="number" value={row.qty} onChange={e=>setManualRows(r=>{const n=[...r];n[i]={...n[i],qty:e.target.value};return n;})} placeholder="15" style={{...iS,marginBottom:0,fontSize:12,padding:"8px 6px"}}/>
                  <input type="number" value={row.avgPrice} onChange={e=>setManualRows(r=>{const n=[...r];n[i]={...n[i],avgPrice:e.target.value};return n;})} placeholder="1450" style={{...iS,marginBottom:0,fontSize:12,padding:"8px 6px"}}/>
                  <select value={row.sector} onChange={e=>setManualRows(r=>{const n=[...r];n[i]={...n[i],sector:e.target.value};return n;})} style={{...iS,marginBottom:0,fontSize:11,padding:"8px 4px",appearance:"none"}}>
                    {["Tech","Finance","Energy","FMCG","Health","Infra","Other"].map(s=><option key={s}>{s}</option>)}
                  </select>
                  <button onClick={()=>setManualRows(r=>r.length>1?r.filter((_,j)=>j!==i):[{symbol:"",name:"",qty:"",avgPrice:"",sector:"Other"}])}
                    style={{background:"rgba(255,83,112,.15)",border:"none",borderRadius:7,color:"#ff5370",fontSize:14,height:34,cursor:"pointer"}}>✕</button>
                </div>
              ))}
            </div>
            <button onClick={()=>setManualRows(r=>[...r,{symbol:"",name:"",qty:"",avgPrice:"",sector:"Other"}])}
              style={{width:"100%",padding:"9px",borderRadius:10,border:"1px dashed rgba(124,58,237,.35)",background:"rgba(124,58,237,.07)",color:"#c084fc",fontSize:13,fontWeight:600,marginBottom:4,cursor:"pointer"}}>
              + Add Row
            </button>
          </>)}

          {/* Error */}
          {importError&&(
            <div style={{background:"rgba(255,83,112,.08)",border:"1px solid rgba(255,83,112,.2)",borderRadius:9,padding:"9px 12px",fontSize:12,color:"#ff5370",marginBottom:10}}>
              ⚠ {importError}
            </div>
          )}

          {/* Preview table — paste & file modes */}
          {importMode!=="manual"&&importRows.length>0&&(
            <>
              <div style={{fontSize:12,fontWeight:700,color:"#00c878",marginBottom:8}}>✓ {importRows.length} shares ready to import</div>
              <div style={{background:"rgba(0,200,120,.05)",border:"1px solid rgba(0,200,120,.15)",borderRadius:10,padding:"10px 12px",maxHeight:220,overflowY:"auto",marginBottom:12}}>
                <div style={{display:"grid",gridTemplateColumns:"1.2fr 2fr 0.8fr 1fr",gap:6,marginBottom:6}}>
                  {["Symbol","Name","Qty","Avg Price"].map(h=>(
                    <div key={h} style={{fontSize:9,color:"rgba(255,255,255,.35)",fontWeight:700,letterSpacing:".06em",textTransform:"uppercase"}}>{h}</div>
                  ))}
                </div>
                {importRows.map((r,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"1.2fr 2fr 0.8fr 1fr",gap:6,padding:"5px 0",borderTop:"1px solid rgba(255,255,255,.04)"}}>
                    <span style={{fontFamily:"JetBrains Mono",fontSize:11,color:"#00f0dc"}}>{r.symbol}</span>
                    <span style={{fontSize:11,color:"rgba(255,255,255,.6)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</span>
                    <span style={{fontFamily:"JetBrains Mono",fontSize:11}}>{r.qty}</span>
                    <span style={{fontFamily:"JetBrains Mono",fontSize:11,color:"#ffd700"}}>₹{r.avgPrice}</span>
                  </div>
                ))}
              </div>
              <Btn onClick={commitImport} col="#7c3aed" tc="#fff">⬆ Import {importRows.length} Stocks</Btn>
            </>
          )}

          {/* Manual commit */}
          {importMode==="manual"&&(
            <Btn onClick={commitManual} col="#7c3aed" tc="#fff" style={{marginTop:8}}>
              ⬆ Import {manualRows.filter(r=>r.symbol&&r.qty).length} Stocks
            </Btn>
          )}
        </Modal>
      )}
