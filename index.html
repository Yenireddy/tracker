      {editStock&&(
        <Modal title="✏ Edit Stock" onClose={()=>setEditStock(null)}>
          <FI label="Symbol" value={editStock.symbol} onChange={e=>setEditStock(f=>({...f,symbol:e.target.value.toUpperCase()}))}/>
          <FI label="Company Name" value={editStock.name} onChange={e=>setEditStock(f=>({...f,name:e.target.value}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <FI label="Qty" type="number" value={editStock.qty} onChange={e=>setEditStock(f=>({...f,qty:e.target.value}))}/>
            <FI label="Avg Price (₹)" type="number" value={editStock.avgPrice} onChange={e=>setEditStock(f=>({...f,avgPrice:e.target.value}))}/>
          </div>
          <FI label="Current Price (₹)" type="number" value={editStock.currentPrice} onChange={e=>setEditStock(f=>({...f,currentPrice:e.target.value}))}/>
          <FS label="Sector" value={editStock.sector} onChange={e=>setEditStock(f=>({...f,sector:e.target.value}))} options={["Tech","Finance","Energy","FMCG","Health","Infra","Other"]}/>
          <Btn onClick={saveEditStock}>Save Changes</Btn>
        </Modal>
      )}

      {/* Edit MF Modal */}
      {editMF&&(
        <Modal title="✏ Edit Mutual Fund" onClose={()=>setEditMF(null)}>
          <FI label="Fund Name" value={editMF.name} onChange={e=>setEditMF(f=>({...f,name:e.target.value}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <FI label="Current NAV (₹) — daily" type="number" value={editMF.currentNAV} onChange={e=>setEditMF(f=>({...f,currentNAV:e.target.value}))}/>
            <FS label="Category" value={editMF.category} onChange={e=>setEditMF(f=>({...f,category:e.target.value}))} options={["Equity","Debt","Hybrid","Silver","Gold","Sector","ELSS"]}/>
          </div>

          {(!editMF.sips||editMF.sips.length===0)&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <FI label="Invested (₹)" type="number" value={editMF.invested} onChange={e=>setEditMF(f=>({...f,invested:e.target.value}))}/>
              <FI label="Total Units" type="number" value={editMF.units} onChange={e=>setEditMF(f=>({...f,units:e.target.value}))}/>
            </div>
          )}

          {editMF.sips&&editMF.sips.length>0&&(<>
            <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,.45)",textTransform:"uppercase",letterSpacing:".06em",margin:"14px 0 4px"}}>Monthly SIPs</div>
            <div style={{fontSize:10,color:"rgba(224,64,251,.7)",marginBottom:8}}>Invested &amp; units are calculated from these SIP entries (Amount ÷ Purchase NAV).</div>
            {editMF.sips.map((sp,idx)=>(
              <div key={idx} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:11,padding:"10px 11px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                  <span style={{fontSize:12,fontWeight:700}}>{monthLabel(sp.month)}</span>
                  <button onClick={()=>setEditMF(f=>({...f,sips:f.sips.filter((_,i)=>i!==idx)}))} style={{background:"rgba(255,83,112,.12)",border:"1px solid rgba(255,83,112,.3)",color:"#ff5370",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700}}>🗑 Delete</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
                  <div>
                    <div style={{fontSize:9,color:"rgba(255,255,255,.3)",marginBottom:2}}>Month</div>
                    <input type="month" value={sp.month} onChange={e=>setEditMF(f=>({...f,sips:f.sips.map((x,i)=>i===idx?{...x,month:e.target.value}:x)}))} style={{width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"7px 8px",color:"#fff",fontSize:11,fontFamily:"Outfit",outline:"none"}}/>
                  </div>
                  <div>
                    <div style={{fontSize:9,color:"rgba(255,255,255,.3)",marginBottom:2}}>Amount ₹</div>
                    <input type="number" value={sp.amount} onChange={e=>setEditMF(f=>({...f,sips:f.sips.map((x,i)=>i===idx?{...x,amount:e.target.value}:x)}))} style={{width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"7px 8px",color:"#fff",fontSize:11,fontFamily:"JetBrains Mono",outline:"none"}}/>
                  </div>
                  <div>
                    <div style={{fontSize:9,color:"rgba(255,255,255,.3)",marginBottom:2}}>Purch. NAV</div>
                    <input type="number" value={sp.nav} onChange={e=>setEditMF(f=>({...f,sips:f.sips.map((x,i)=>i===idx?{...x,nav:e.target.value}:x)}))} style={{width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"7px 8px",color:"#fff",fontSize:11,fontFamily:"JetBrains Mono",outline:"none"}}/>
                  </div>
                </div>
                <div style={{fontSize:9,color:"rgba(255,255,255,.35)",marginTop:5}}>Units this month: <span className="mono" style={{color:"#e040fb"}}>{(Number(sp.nav)>0?Number(sp.amount)/Number(sp.nav):0).toFixed(3)}</span></div>
              </div>
            ))}
          </>)}

          <Btn onClick={saveEditMF}>Save Changes</Btn>
        </Modal>
      )}

      {/* Edit Scheme Modal */}
      {editScheme&&(
        <Modal title="✏ Edit Scheme" onClose={()=>setEditScheme(null)}>
          <FI label="Scheme Name" value={editScheme.label} onChange={e=>setEditScheme(f=>({...f,label:e.target.value}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <FS label="Metal" value={editScheme.metal} onChange={e=>setEditScheme(f=>({...f,metal:e.target.value,purity:e.target.value==="gold"?"22K":"999"}))} options={[{v:"gold",l:"🥇 Gold"},{v:"silver",l:"🥈 Silver"}]}/>
            <FS label="Purity" value={editScheme.purity} onChange={e=>setEditScheme(f=>({...f,purity:e.target.value}))} options={editScheme.metal==="gold"?["24K","22K","18K"]:["999","925"]}/>
          </div>
          <FI label="Monthly Amount (₹)" type="number" value={editScheme.monthlyAmount??""} onChange={e=>setEditScheme(f=>({...f,monthlyAmount:e.target.value}))}/>

          <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,.45)",textTransform:"uppercase",letterSpacing:".06em",margin:"14px 0 8px"}}>Monthly Payments</div>
          {(editScheme.installments||[]).length===0&&<div style={{fontSize:11,color:"rgba(255,255,255,.3)",marginBottom:8}}>No payments. Add them with “+ Month” on the card.</div>}
          {(editScheme.installments||[]).map((inst,idx)=>(
            <div key={idx} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:11,padding:"10px 11px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                <span style={{fontSize:12,fontWeight:700,color:"#fff"}}>{monthLabel(inst.month)}</span>
                <button onClick={()=>setEditScheme(f=>({...f,installments:f.installments.filter((_,i)=>i!==idx)}))} style={{background:"rgba(255,83,112,.12)",border:"1px solid rgba(255,83,112,.3)",color:"#ff5370",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700}}>🗑 Delete</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
                <div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,.3)",marginBottom:2}}>Month</div>
                  <input type="month" value={inst.month} onChange={e=>setEditScheme(f=>({...f,installments:f.installments.map((x,i)=>i===idx?{...x,month:e.target.value}:x)}))} style={{width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"7px 8px",color:"#fff",fontSize:11,fontFamily:"Outfit",outline:"none"}}/>
                </div>
                <div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,.3)",marginBottom:2}}>Amount ₹</div>
                  <input type="number" value={inst.amountPaid} onChange={e=>setEditScheme(f=>({...f,installments:f.installments.map((x,i)=>i===idx?{...x,amountPaid:e.target.value}:x)}))} style={{width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"7px 8px",color:"#fff",fontSize:11,fontFamily:"JetBrains Mono",outline:"none"}}/>
                </div>
                <div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,.3)",marginBottom:2}}>Grams</div>
                  <input type="number" step="0.001" value={inst.gramsAllotted} onChange={e=>setEditScheme(f=>({...f,installments:f.installments.map((x,i)=>i===idx?{...x,gramsAllotted:e.target.value}:x)}))} style={{width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"7px 8px",color:"#fff",fontSize:11,fontFamily:"JetBrains Mono",outline:"none"}}/>
                </div>
              </div>
            </div>
          ))}

          <Btn onClick={()=>{ if(!editScheme.label){return;} setData(d=>({...d,metalSchemes:d.metalSchemes.map(s=>s.id===editScheme.id?{...s,label:editScheme.label,metal:editScheme.metal,purity:editScheme.purity,monthlyAmount:Number(editScheme.monthlyAmount||0),installments:(editScheme.installments||[]).map(x=>({month:x.month,amountPaid:Number(x.amountPaid||0),gramsAllotted:Number(x.gramsAllotted||0)}))}:s)})); setEditScheme(null); }} col="#ffd700">Save Changes</Btn>
        </Modal>
      )}

      {/* Edit Physical Gold Modal */}
      {editPhysGold&&(
        <Modal title="✏ Edit Physical Gold" onClose={()=>setEditPhysGold(null)}>
          <FI label="Purchase Date" type="date" value={editPhysGold.date} onChange={e=>setEditPhysGold(f=>({...f,date:e.target.value}))}/>
          <FI label="Item Description" value={editPhysGold.item} onChange={e=>setEditPhysGold(f=>({...f,item:e.target.value}))}/>
          <FI label="Vendor / Jeweller" value={editPhysGold.vendor} onChange={e=>setEditPhysGold(f=>({...f,vendor:e.target.value}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <FS label="Purity" value={editPhysGold.purity} onChange={e=>setEditPhysGold(f=>({...f,purity:e.target.value}))} options={["24K","22K","18K","14K"]}/>
            <FI label="Weight (grams)" type="number" step="0.001" value={editPhysGold.grams} onChange={e=>setEditPhysGold(f=>({...f,grams:e.target.value}))}/>
          </div>
          <FI label="Purchase Value (₹)" type="number" value={editPhysGold.purchaseValue} onChange={e=>setEditPhysGold(f=>({...f,purchaseValue:e.target.value}))}/>
          <Btn onClick={saveEditPhysGold} col="#ffd700">Save Changes</Btn>
        </Modal>
      )}

      {/* Edit Physical Silver Modal */}
      {editPhysSilver&&(
        <Modal title="✏ Edit Physical Silver" onClose={()=>setEditPhysSilver(null)}>
          <FI label="Purchase Date" type="date" value={editPhysSilver.date} onChange={e=>setEditPhysSilver(f=>({...f,date:e.target.value}))}/>
          <FI label="Item Description" value={editPhysSilver.item} onChange={e=>setEditPhysSilver(f=>({...f,item:e.target.value}))}/>
          <FI label="Vendor" value={editPhysSilver.vendor} onChange={e=>setEditPhysSilver(f=>({...f,vendor:e.target.value}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <FS label="Purity" value={editPhysSilver.purity} onChange={e=>setEditPhysSilver(f=>({...f,purity:e.target.value}))} options={["999","925","800"]}/>
            <FI label="Weight (grams)" type="number" step="0.001" value={editPhysSilver.grams} onChange={e=>setEditPhysSilver(f=>({...f,grams:e.target.value}))}/>
          </div>
          <FI label="Purchase Value (₹)" type="number" value={editPhysSilver.purchaseValue} onChange={e=>setEditPhysSilver(f=>({...f,purchaseValue:e.target.value}))}/>
          <Btn onClick={saveEditPhysSilver} col="#c0c0c0">Save Changes</Btn>
        </Modal>
      )}

      {confirmDel&&<ConfirmDelete label={confirmDel.label} onConfirm={doDelete} onCancel={()=>setConfirmDel(null)}/>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// EMI & DEBT
// ══════════════════════════════════════════════════════════════════════════════
function EMIDebt({data,setData}){
  const {loans,cards}=data;
  const [showAdd,setShowAdd]=useState(false);
  const [editLoan,setEditLoan]=useState(null);
  const [editCard,setEditCard]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null); // {type,id,label}
  const [openCard,setOpenCard]=useState(null);
  const tapToggle=(key)=>setOpenCard(c=>c===key?null:key);
  const [lF,setLF]=useState({type:"loan",label:"",lender:"",total:"",remaining:"",emi:"",dueDay:"",secured:true,color:"#00f0dc",last4:"",outstanding:"",limit:"",dueDate:today()});
  const totalDebt=loans.reduce((s,l)=>s+l.remaining,0)+cards.reduce((s,c)=>s+c.outstanding,0);
  const days=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i-1);return d;});

  function addDebt(){
    if(lF.type==="loan"){
      if(!lF.label||!lF.remaining||!lF.emi) return;
      setData(d=>({...d,loans:[...d.loans,{id:uid(),label:lF.label,lender:lF.lender,total:Number(lF.total||lF.remaining),remaining:Number(lF.remaining),emi:Number(lF.emi),dueDay:Number(lF.dueDay||5),secured:lF.secured==="true"||lF.secured===true,color:lF.color}]}));
    } else {
      if(!lF.label||!lF.outstanding) return;
      setData(d=>({...d,cards:[...d.cards,{id:uid(),label:lF.label,last4:lF.last4||"0000",outstanding:Number(lF.outstanding),limit:Number(lF.limit||100000),dueDate:lF.dueDate,color:"linear-gradient(135deg,#00f0dc,#7c3aed)"}]}));
    }
    setShowAdd(false);
    setLF({type:"loan",label:"",lender:"",total:"",remaining:"",emi:"",dueDay:"",secured:true,color:"#00f0dc",last4:"",outstanding:"",limit:"",dueDate:today()});
  }

  function saveEditLoan(){
    if(!editLoan.label) return;
    setData(d=>({...d,loans:d.loans.map(l=>l.id===editLoan.id?{...l,label:editLoan.label,lender:editLoan.lender,total:Number(editLoan.total||editLoan.remaining),remaining:Number(editLoan.remaining),emi:Number(editLoan.emi),dueDay:Number(editLoan.dueDay||5),secured:editLoan.secured==="true"||editLoan.secured===true}:l)}));
    setEditLoan(null);
  }
  function saveEditCard(){
    if(!editCard.label) return;
    setData(d=>({...d,cards:d.cards.map(c=>c.id===editCard.id?{...c,label:editCard.label,last4:editCard.last4||"0000",outstanding:Number(editCard.outstanding),limit:Number(editCard.limit||100000),dueDate:editCard.dueDate}:c)}));
    setEditCard(null);
  }
  function doDelete(){
    if(!confirmDel) return;
    if(confirmDel.type==="loan") setData(d=>({...d,loans:d.loans.filter(l=>l.id!==confirmDel.id)}));
    else if(confirmDel.type==="card") setData(d=>({...d,cards:d.cards.filter(c=>c.id!==confirmDel.id)}));
    setConfirmDel(null);
  }

  return(
    <div className="slide-in" style={{paddingBottom:100}}>
      <div style={{padding:"22px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:22,fontWeight:800}}>EMI & Debt</div>
        <button onClick={()=>setShowAdd(true)} style={{width:36,height:36,borderRadius:10,background:"rgba(0,240,220,.1)",border:"1px solid rgba(0,240,220,.22)",color:"#00f0dc",fontSize:20,fontWeight:700}}>+</button>
      </div>

      <div style={{padding:"14px 16px 0",display:"flex",gap:8,overflowX:"auto"}}>
        {days.map((d,i)=>{
          const isToday=d.toDateString()===new Date().toDateString();
          const hasDue=loans.some(l=>l.dueDay===d.getDate());
          return(
            <div key={i} style={{flexShrink:0,width:50,padding:"9px 0",borderRadius:13,background:isToday?"#00f0dc":"rgba(255,255,255,.05)",border:isToday?"none":"1px solid rgba(255,255,255,.07)",textAlign:"center",cursor:"pointer"}}>
              <div style={{fontSize:9,color:isToday?"rgba(0,0,0,.5)":"rgba(255,255,255,.35)",fontWeight:600,marginBottom:2}}>{["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()]}</div>
              <div style={{fontSize:17,fontWeight:700,color:isToday?"#000":"#fff"}}>{d.getDate()}</div>
              {hasDue&&<div style={{width:4,height:4,borderRadius:"50%",background:isToday?"#000":"#00f0dc",margin:"3px auto 0"}}/>}
            </div>
          );
        })}
      </div>

      {loans[0]&&(
        <div style={{margin:"12px 16px 0",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",borderRadius:16,padding:"13px 16px",display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:22}}>🌸</span>
          <div style={{flex:1}}>
            <div style={{color:"#00f0dc",fontWeight:700,fontSize:14}}>Next payment in {loans[0].dueDay} days</div>
            <div style={{color:"rgba(255,255,255,.4)",fontSize:12}}>{loans[0].label} · {fmtK(loans[0].emi)}</div>
          </div>
          <button style={{padding:"7px 14px",borderRadius:9,background:"#00f0dc",border:"none",color:"#000",fontWeight:700,fontSize:12}}>Pay Now</button>
        </div>
      )}

      <div style={{margin:"12px 16px 0",background:"rgba(255,83,112,.07)",border:"1px solid rgba(255,83,112,.14)",borderRadius:14,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:10,color:"rgba(255,83,112,.6)"}}>Total Outstanding Debt</div><div className="mono" style={{fontSize:20,fontWeight:700,color:"#ff5370"}}>{fmtK(totalDebt)}</div></div>
        <div style={{fontSize:24}}>🔻</div>
      </div>

      <div style={{padding:"14px 16px 0"}}>
        {["Secured","Unsecured"].map(type=>{
          const list=loans.filter(l=>type==="Secured"?l.secured:!l.secured);
          if(!list.length) return null;
          return(
            <div key={type} style={{marginBottom:4}}>
              <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.35)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:10}}>{type} Loans</div>
              {list.map(l=>{
                const paid=Math.round((1-l.remaining/l.total)*100);
                const open=openCard===("loan-"+l.id);
                return(
                  <div key={l.id} className="fade-up" onClick={()=>tapToggle("loan-"+l.id)} style={{background:"rgba(255,255,255,.03)",border:"1px solid "+(open?"rgba(0,240,220,.25)":"rgba(255,255,255,.07)"),borderRadius:15,padding:"13px",marginBottom:10,cursor:"pointer"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:13,height:36,borderRadius:5,background:l.color}}/>
                        <div><div style={{fontSize:14,fontWeight:700}}>{l.label}</div><div style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>{l.lender}</div></div>
                      </div>
                      <div className="mono" style={{fontSize:16,fontWeight:700}}>{fmtK(l.remaining)}</div>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                      <span style={{fontSize:10,color:"rgba(255,255,255,.35)"}}>{paid}% paid</span>
                      <span style={{fontSize:10,color:"rgba(255,255,255,.35)"}}>of {fmtK(l.total)}</span>
                    </div>
                    <div style={{height:5,background:"rgba(255,255,255,.07)",borderRadius:3,overflow:"hidden",marginBottom:7}}>
                      <div style={{width:`${paid}%`,height:"100%",background:l.color,borderRadius:3}}/>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontSize:10,color:"rgba(255,255,255,.32)"}}>EMI <span className="mono" style={{color:l.color}}>{fmtK(l.emi)}/mo</span></span>
                      <span style={{fontSize:10,color:"rgba(255,255,255,.32)"}}>Due day {l.dueDay}</span>
                    </div>
                    {open&&(
                      <div onClick={e=>e.stopPropagation()}>
                        <ActionBar onEdit={()=>setEditLoan({...l,total:String(l.total),remaining:String(l.remaining),emi:String(l.emi),dueDay:String(l.dueDay),secured:String(l.secured)})} onDelete={()=>setConfirmDel({type:"loan",id:l.id,label:l.label})}/>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
        <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.35)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:10}}>Credit Cards</div>
        {cards.length===0&&<div style={{fontSize:12,color:"rgba(255,255,255,.3)",marginBottom:8}}>No cards yet. Tap + to add one.</div>}
        <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:4}}>
          {cards.map(c=>{
            const open=openCard===("card-"+c.id);
            return(
              <div key={c.id} style={{flexShrink:0,width:235}}>
                <div onClick={()=>tapToggle("card-"+c.id)} style={{borderRadius:17,padding:"16px 17px 14px",background:c.color,position:"relative",overflow:"hidden",cursor:"pointer"}}>
                  <div style={{position:"absolute",right:-16,top:-16,width:68,height:68,borderRadius:"50%",background:"rgba(255,255,255,.12)"}}/>
                  <div style={{fontSize:9,color:"rgba(255,255,255,.6)",fontWeight:700,letterSpacing:".1em",marginBottom:12}}>CREDIT CARD</div>
                  <div style={{fontFamily:"JetBrains Mono",fontSize:13,color:"#fff",letterSpacing:".1em",marginBottom:10}}>**** **** **** {c.last4}</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,.5)"}}>Card Holder</div>
                  <div style={{fontSize:12,fontWeight:700,color:"#fff",marginBottom:9}}>{data.profile.name.toUpperCase()}</div>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <div><div style={{fontSize:9,color:"rgba(255,255,255,.5)"}}>Outstanding</div><div className="mono" style={{fontSize:12,fontWeight:700,color:"#fff"}}>{fmtK(c.outstanding)}</div></div>
                    <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"rgba(255,255,255,.5)"}}>Due</div><div style={{fontSize:10,color:"#fff"}}>{fmtDate(c.dueDate)}</div></div>
                  </div>
                </div>
                {open&&(<ActionBar onEdit={()=>setEditCard({...c,outstanding:String(c.outstanding),limit:String(c.limit)})} onDelete={()=>setConfirmDel({type:"card",id:c.id,label:c.label})}/>)}
              </div>
            );
          })}
        </div>
      </div>

      {showAdd&&(
        <Modal title="Add Debt / EMI" onClose={()=>setShowAdd(false)}>
          <div style={{display:"flex",gap:7,marginBottom:12}}>
            {[["loan","Loan / EMI"],["card","Credit Card"]].map(([t,l])=>(
              <button key={t} onClick={()=>setLF(f=>({...f,type:t}))} style={{flex:1,padding:"9px",borderRadius:10,border:"none",background:lF.type===t?"rgba(255,83,112,.18)":"rgba(255,255,255,.06)",color:lF.type===t?"#ff5370":"rgba(255,255,255,.35)",fontWeight:700,fontSize:13}}>{l}</button>
            ))}
          </div>
          {lF.type==="loan"&&(<>

// REPORTS

function Reports({data}){
  const {transactions,stocks,mfs,metalSchemes,physicalGold,physicalSilver,bankBalances,loans,cards,prices}=data;

    const q=search.toLowerCase();
    const mQ=!q||(t.label.toLowerCase().includes(q)||t.cat.toLowerCase().includes(q)||(t.note||"").toLowerCase().includes(q)||String(t.amount).includes(q));
    return mQ&&(!dateFrom||t.date>=dateFrom)&&(!dateTo||t.date<=dateTo);
  });

  const totalIn=filtered.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalOut=filtered.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const stockVal=stocks.reduce((s,st)=>s+st.qty*st.currentPrice,0);
  const mfVal=mfs.reduce((s,m)=>s+mfUnits(m)*m.currentNAV,0);
  const goldG=metalSchemes.filter(s=>s.metal==="gold").reduce((s,sc)=>s+sc.installments.reduce((a,i)=>a+i.gramsAllotted,0),0);
  const physGoldG=(physicalGold||[]).reduce((s,p)=>s+p.grams,0);
  const silverG=metalSchemes.filter(s=>s.metal==="silver").reduce((s,sc)=>s+sc.installments.reduce((a,i)=>a+i.gramsAllotted,0),0);
  const physSilverG=(physicalSilver||[]).reduce((s,p)=>s+p.grams,0);
  const goldVal=(goldG+physGoldG)*prices.gold22k;

  const bankTotal=bankBalances.reduce((s,b)=>s+b.balance,0);

  const catSpend={};

  const catSorted=Object.entries(catSpend).sort((a,b)=>b[1]-a[1]);

function PriceUpdate({data,setData,nav}){
  const {prices}=data;

  function save(){
    setData(d=>({...d,usdRate:Number(pF.usdRate)||d.usdRate,prices:{...d.prices,gold22k:Number(pF.gold22k)||d.prices.gold22k,silver999:Number(pF.silver999)||d.prices.silver999,lastUpdated:today()}}));
    nav("dash");
  }

  const goldG=data.metalSchemes.filter(s=>s.metal==="gold").reduce((s,sc)=>s+sc.installments.reduce((a,i)=>a+i.gramsAllotted,0),0);

          <div style={{fontSize:11,color:"rgba(255,255,255,.3)"}}>Update once daily. All metal values and USD conversions reflect the new rates immediately.</div>

        {[["🥇 Gold 22K (₹ per gram)","gold22k","#ffd700",`Currently ₹${prices.gold22k}/g`],

            <input type="number" step="0.01" value={pF[key]} onChange={e=>setPF(f=>({...f,[key]:e.target.value}))}

          </div>
        ))}

        <Card style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,.45)",marginBottom:10}}>Impact Preview</div>
          {[["Gold total value",`${goldG.toFixed(2)}g × ₹${pF.gold22k||prices.gold22k}`,`₹${(goldG*(Number(pF.gold22k)||prices.gold22k)).toLocaleString("en-IN")}`,"#ffd700"],
            ["Silver total value",`${silverG.toFixed(2)}g × ₹${pF.silver999||prices.silver999}`,`₹${(silverG*(Number(pF.silver999)||prices.silver999)).toLocaleString("en-IN")}`,"#c0c0c0"]].map(([l,eq,v,c])=>(

              <div className="mono" style={{fontSize:13,fontWeight:700,color:c}}>{v}</div>
            </div>
          ))}
        </Card>

        <Btn onClick={save}>✅ Save Today's Prices</Btn>
      </div>
    </div>
  );
}

// PROFILE
// ══════════════════════════════════════════════════════════════════════════════
function Profile({data,setData,nav}){
  const {profile,bankBalances,cards,stocks,mfs,metalSchemes,loans,transactions}=data;
  const [editing,setEditing]=useState(false);
  const [pF,setPF]=useState({...profile});
  const [activeModal,setActiveModal]=useState(null); // "security"|"notifications"|"export"|"appearance"

  // Settings state
  const [security,setSecurity]=useState({pin:true,twoFA:true,biometric:false});
  const [notifs,setNotifs]=useState({emiDue:true,dividends:true,priceAlert:false,weeklyReport:true,lowBalance:true});
  const [theme,setTheme]=useState("dark");

  const totalAlerts=loans.filter(l=>l.dueDay<=7).length+cards.filter(c=>new Date(c.dueDate)<=new Date(Date.now()+7*864e5)).length;

  function save(){ setData(d=>({...d,profile:pF})); setEditing(false); }

  function exportCSV(){
    const rows=[
      ["Date","Type","Category","Label","Amount (₹)","USD Amount","Rate Used","Note"],
      ...transactions.map(t=>[t.date,t.type,t.cat,t.label,t.amount,t.amountUSD||"",t.rateUsed||"",t.note||""])
    ];
    const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=`transactions_${today()}.csv`; a.click();
    URL.revokeObjectURL(url);
    setActiveModal(null);
  }

  const Toggle=({on,onChange})=>(

    <div className="slide-in" style={{paddingBottom:100}}>
      <div style={{padding:"22px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={()=>nav("dash")} style={{background:"none",border:"none",color:"rgba(255,255,255,.45)",fontSize:18}}>←</button>
        <span style={{fontSize:17,fontWeight:700}}>Profile</span>
        <button onClick={()=>setEditing(!editing)} style={{background:"none",border:"none",color:"#00f0dc",fontSize:16}}>✏</button>
      </div>

      <div style={{margin:"18px 16px 0",background:"rgba(255,255,255,.03)",border:"1px solid rgba(0,240,220,.12)",borderRadius:20,padding:"22px",textAlign:"center"}}>
        <div style={{width:74,height:74,borderRadius:"50%",background:"linear-gradient(135deg,#00f0dc,#7c3aed)",margin:"0 auto 12px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,border:"3px solid rgba(0,240,220,.28)",position:"relative"}}>
          👤<div style={{position:"absolute",bottom:2,right:2,width:12,height:12,borderRadius:"50%",background:"#00c878",border:"2px solid #0e1525"}}/>
        </div>
        {editing?(
          <>
            <input style={{...iS,textAlign:"center",marginBottom:8}} value={pF.name} onChange={e=>setPF(f=>({...f,name:e.target.value}))}/>
            <input style={{...iS,textAlign:"center",marginBottom:12}} value={pF.email} onChange={e=>setPF(f=>({...f,email:e.target.value}))}/>
            <button onClick={save} style={{padding:"9px 22px",background:"#00f0dc",border:"none",borderRadius:10,fontWeight:700,fontSize:13,color:"#000"}}>Save</button>
          </>
        ):(
          <>
            <div style={{fontSize:20,fontWeight:800}}>{profile.name}</div>

        <div style={{display:"flex",marginTop:16,borderTop:"1px solid rgba(255,255,255,.07)",paddingTop:14}}>

          <SettingRow label="EMI Due Reminders" sub="Alert 3 days before due date" on={notifs.emiDue} onChange={()=>setNotifs(n=>({...n,emiDue:!n.emiDue}))}/>
          <SettingRow label="Dividend Alerts" sub="Notify when dividends are credited" on={notifs.dividends} onChange={()=>setNotifs(n=>({...n,dividends:!n.dividends}))}/>

          <SettingRow label="Weekly Summary Report" sub="Every Sunday morning" on={notifs.weeklyReport} onChange={()=>setNotifs(n=>({...n,weeklyReport:!n.weeklyReport}))}/>
          <SettingRow label="Low Balance Warning" sub="When bank balance drops below ₹5,000" on={notifs.lowBalance} onChange={()=>setNotifs(n=>({...n,lowBalance:!n.lowBalance}))}/>
          <Btn onClick={()=>setActiveModal(null)} style={{marginTop:16}}>Save Preferences</Btn>
        </Modal>
      )}

      {/* EXPORT MODAL */}
      {activeModal==="export"&&(
        <Modal title="📊 Export Data" onClose={()=>setActiveModal(null)}>
          <div style={{background:"rgba(0,240,220,.05)",border:"1px solid rgba(0,240,220,.14)",borderRadius:11,padding:"12px 14px",marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>What will be exported</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.45)",lineHeight:1.6}}>
              All {transactions.length} transactions including date, type, category, label, amount in ₹, USD amount (if applicable), exchange rate used, and notes.
            </div>
          </div>
          {[["Format","CSV (opens in Excel, Google Sheets)"],["File name",`transactions_${today()}.csv`],["Encoding","UTF-8"]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
              <span style={{fontSize:12,color:"rgba(255,255,255,.4)"}}>{l}</span>
              <span style={{fontSize:12,color:"#e8edf5",fontWeight:500}}>{v}</span>
            </div>
          ))}
          <Btn onClick={exportCSV} style={{marginTop:18}}>⬇ Download CSV</Btn>
        </Modal>
      )}

      {/* APPEARANCE MODAL */}
      {activeModal==="appearance"&&(
        <Modal title="🎨 Appearance" onClose={()=>setActiveModal(null)}>
          <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginBottom:14}}>Choose your preferred theme.</div>
          {[["dark","🌙 Dark Theme","Easy on eyes, ideal for night use"],["light","☀️ Light Theme","Bright and clean for daytime use"]].map(([val,label,desc])=>(
            <div key={val} onClick={()=>setTheme(val)}
              style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",borderRadius:13,border:`1px solid ${theme===val?"#00f0dc":"rgba(255,255,255,.07)"}`,background:theme===val?"rgba(0,240,220,.07)":"rgba(255,255,255,.03)",marginBottom:10,cursor:"pointer"}}>
              <div style={{fontSize:22}}>{label.split(" ")[0]}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:theme===val?"#00f0dc":"#e8edf5"}}>{label.slice(2)}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:2}}>{desc}</div>
              </div>
              {theme===val&&<div style={{width:18,height:18,borderRadius:"50%",background:"#00f0dc",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#000",fontWeight:700}}>✓</div>}
            </div>
          ))}
          <Btn onClick={()=>setActiveModal(null)} style={{marginTop:6}}>Apply</Btn>
        </Modal>
      )}
    </div>
  );
}

// ── Secure hashing — scrambles the PIN before it ever touches the cloud ───────
async function sha256(text){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode("AStracker:"+text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ── PIN lock screen (create + enter modes) ────────────────────────────────────
function PinGate({mode,onSubmit}){
  // mode: "create" | "enter"
  const [stage,setStage]=useState("first"); // for create: first -> confirm
  const [firstPin,setFirstPin]=useState("");
  const [pin,setPin]=useState("");
  const [error,setError]=useState("");
  const [shake,setShake]=useState(false);

  function press(n){
    if(pin.length>=4) return;
    setError("");
    const next=pin+n;
    setPin(next);
    if(next.length===4){
      setTimeout(()=>handleFull(next),120);
    }
  }
  function del(){ setError(""); setPin(p=>p.slice(0,-1)); }

  async function handleFull(full){
    if(mode==="create"){
      if(stage==="first"){
        setFirstPin(full);
        setPin("");
        setStage("confirm");
      }else{
        if(full===firstPin){
          const h=await sha256(full);
          onSubmit(h);
        }else{
          setError("PINs didn't match. Start again.");
          setShake(true); setTimeout(()=>setShake(false),400);
          setStage("first"); setFirstPin(""); setPin("");
        }
      }
    }else{
      const h=await sha256(full);
      const ok=await onSubmit(h); // returns true/false
      if(!ok){
        setError("Wrong PIN. Try again.");
        setShake(true); setTimeout(()=>setShake(false),400);
        setPin("");
      }
    }
  }

  const title=mode==="create"
    ? (stage==="first"?"Create your PIN":"Confirm your PIN")
    : "Enter your PIN";
  const sub=mode==="create"
    ? (stage==="first"?"Choose a 4-digit PIN to lock your tracker":"Type it once more to confirm")
    : "Enter your 4-digit PIN to unlock";

  return(
    <>
      <style>{G}</style>
      <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#080b12",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 32px"}}>
        <div style={{fontSize:26,fontWeight:900,marginBottom:6}}>
          <span style={{color:"#ff5370"}}>AS</span>
          <span style={{color:"rgba(255,255,255,.4)"}}>'s </span>
          <span style={{background:"linear-gradient(90deg,#00f0dc,#7c3aed,#e040fb)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>TRACKER</span>
        </div>
        <div style={{fontSize:36,marginBottom:18}}>🔒</div>
        <div style={{fontSize:17,fontWeight:700,marginBottom:5}}>{title}</div>
        <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginBottom:26,textAlign:"center"}}>{sub}</div>

        {/* dots */}
        <div style={{display:"flex",gap:16,marginBottom:14,transform:shake?"translateX(0)":"none",animation:shake?"shk .4s":"none"}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{width:15,height:15,borderRadius:"50%",border:"2px solid "+(pin.length>i?"#00f0dc":"rgba(255,255,255,.2)"),background:pin.length>i?"#00f0dc":"transparent",transition:"all .15s"}}/>
          ))}
        </div>
        <div style={{height:18,marginBottom:14,fontSize:12,color:"#ff5370",fontWeight:600}}>{error}</div>

        {/* keypad */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,width:"100%",maxWidth:280}}>
          {[1,2,3,4,5,6,7,8,9].map(n=>(
            <button key={n} onClick={()=>press(String(n))} style={{height:64,borderRadius:"50%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",color:"#fff",fontSize:24,fontWeight:600,fontFamily:"Outfit",cursor:"pointer"}}>{n}</button>
          ))}
          <div/>
          <button onClick={()=>press("0")} style={{height:64,borderRadius:"50%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",color:"#fff",fontSize:24,fontWeight:600,fontFamily:"Outfit",cursor:"pointer"}}>0</button>
          <button onClick={del} style={{height:64,borderRadius:"50%",background:"none",border:"none",color:"rgba(255,255,255,.5)",fontSize:22,cursor:"pointer"}}>⌫</button>
        </div>
        <style>{`@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}`}</style>
      </div>
    </>
  );
}

class ErrorBoundary extends React.Component{
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(err){ return {err}; }
  componentDidCatch(err,info){ this.setState({err,info}); }
  render(){
    if(this.state.err){
      return React.createElement("div",{style:{padding:"60px 24px",maxWidth:430,margin:"0 auto",color:"#fff",fontFamily:"Outfit",background:"#080b12",minHeight:"100vh"}},
        React.createElement("div",{style:{fontSize:20,fontWeight:800,color:"#ff5370",marginBottom:12}},"⚠ App error"),
        React.createElement("div",{style:{fontSize:13,color:"rgba(255,255,255,.6)",marginBottom:16}},"Please screenshot this and send it:"),
        React.createElement("div",{style:{fontSize:13,fontFamily:"monospace",background:"rgba(255,83,112,.1)",border:"1px solid rgba(255,83,112,.3)",borderRadius:10,padding:"12px",color:"#ff9eb0",whiteSpace:"pre-wrap",wordBreak:"break-word"}},
          String(this.state.err&&this.state.err.message||this.state.err)
        ),
        this.state.err&&this.state.err.stack&&React.createElement("div",{style:{fontSize:10,fontFamily:"monospace",color:"rgba(255,255,255,.4)",marginTop:12,whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:240,overflow:"auto"}},
          String(this.state.err.stack).split("\n").slice(0,8).join("\n")
        )
      );
    }
    return this.props.children;
  }
}

function App(){
  const [data,setDataRaw]=useState(null); // null = loading
  const [screen,setScreen]=useState("dash");
  const [saveStatus,setSaveStatus]=useState("idle"); // idle | saving | saved | error
  const [unlocked,setUnlocked]=useState(false);
  const saveTimer=useRef(null);
  const isFirstLoad=useRef(true);
  const swipe=useRef({x:0,y:0}); // must sit with other hooks, before any early return

  // ── Load from Firestore on mount ──────────────────────────────────────────
  useEffect(()=>{
    loadFromFirestore().then(cloud=>{
      setDataRaw(cloud||INIT);
    });
  },[]);

  // ── Debounced auto-save: fires 1.5s after the last state change ───────────
  useEffect(()=>{
    if(!data) return;
    if(isFirstLoad.current){ isFirstLoad.current=false; return; } // skip save on initial load
    setSaveStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      await saveToFirestore(data);
      setSaveStatus("saved");
      setTimeout(()=>setSaveStatus("idle"),2500);
    },1500);
    return()=>clearTimeout(saveTimer.current);
  },[data]);

  // ── Wrapped setData — identical API to useState setter ───────────────────
  function setData(updater){
    setDataRaw(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      return next;
    });
  }

  function nav(s){ setScreen(s); window.scrollTo(0,0); }

  // ── Loading screen ────────────────────────────────────────────────────────
  if(!data){
    return(
      <>
        <style>{G}</style>
        <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#080b12",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
          <div style={{fontSize:30,fontWeight:900}}>
            <span style={{color:"#ff5370"}}>AS</span>
            <span style={{color:"rgba(255,255,255,.4)"}}>'s </span>
            <span style={{background:"linear-gradient(90deg,#00f0dc,#7c3aed,#e040fb)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>TRACKER</span>
          </div>
          <div style={{width:40,height:40,border:"3px solid rgba(0,240,220,.2)",borderTop:"3px solid #00f0dc",borderRadius:"50%",animation:"spin 0.9s linear infinite"}}/>
          <div style={{fontSize:13,color:"rgba(255,255,255,.3)"}}>Loading your data…</div>
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </div>
      </>
    );
  }

  // ── PIN gate — locks the app until correct PIN entered ────────────────────
  if(!unlocked){
    const hasPin=!!data.pinHash;
    return(
      <PinGate
        mode={hasPin?"enter":"create"}
        onSubmit={(hash)=>{
          if(hasPin){
            if(hash===data.pinHash){ setUnlocked(true); return true; }
            return false;
          }else{
            setData(d=>({...d,pinHash:hash}));
            setUnlocked(true);
            return true;
          }
        }}
      />
    );
  }

  const SCREENS={
    dash:<Dashboard data={data} setData={setData} nav={nav}/>,
    cashflow:<CashFlow data={data} setData={setData}/>,
    invest:<Investments data={data} setData={setData}/>,
    emi:<EMIDebt data={data} setData={setData}/>,
    reports:<Reports data={data}/>,
    profile:<Profile data={data} setData={setData} nav={nav}/>,
    prices:<PriceUpdate data={data} setData={setData} nav={nav}/>,
  };

  const NAV=[{id:"dash",icon:"⊞",label:"Home"},{id:"cashflow",icon:"⇅",label:"Cash"},{id:"invest",icon:"◈",label:"Invest"},{id:"emi",icon:"◷",label:"EMI"},{id:"reports",icon:"⬡",label:"Reports"}];

  // ── Swipe navigation between the 5 main screens ───────────────────────────
  const mainOrder=["dash","cashflow","invest","emi","reports"];
  function onTouchStart(e){ const t=e.changedTouches[0]; swipe.current={x:t.clientX,y:t.clientY}; }
  function onTouchEnd(e){
    const t=e.changedTouches[0];
    const dx=t.clientX-swipe.current.x, dy=t.clientY-swipe.current.y;
    // require a deliberate, mostly-horizontal swipe so it won't fight sideways-scrolling rows
    if(Math.abs(dx)<90 || Math.abs(dx)<Math.abs(dy)*2) return;
    const idx=mainOrder.indexOf(screen);
    if(idx===-1) return; // on profile / prices — ignore
    let ni=idx+(dx<0?1:-1);
    ni=Math.max(0,Math.min(mainOrder.length-1,ni));
    if(ni!==idx) nav(mainOrder[ni]);
  }

  return(
    <>
      <style>{G}</style>
      <div onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#080b12"}}>
        <ErrorBoundary>{SCREENS[screen]||SCREENS.dash}</ErrorBoundary>

        {/* Save status indicator */}
        {saveStatus!=="idle"&&(
          <div style={{position:"fixed",top:12,left:"50%",transform:"translateX(-50%)",zIndex:500,
            background:saveStatus==="error"?"rgba(255,83,112,.9)":saveStatus==="saved"?"rgba(0,200,120,.9)":"rgba(14,21,37,.95)",
            border:`1px solid ${saveStatus==="error"?"#ff5370":saveStatus==="saved"?"#00c878":"rgba(0,240,220,.3)"}`,
            borderRadius:20,padding:"6px 16px",fontSize:12,fontWeight:600,
            color:saveStatus==="saving"?"#00f0dc":"#fff",
            boxShadow:"0 4px 16px rgba(0,0,0,.4)",
            display:"flex",alignItems:"center",gap:6}}>
            {saveStatus==="saving"&&<div style={{width:10,height:10,border:"2px solid rgba(0,240,220,.3)",borderTop:"2px solid #00f0dc",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>}
            {saveStatus==="saved"&&"✅"}
            {saveStatus==="error"&&"⚠"}
            {saveStatus==="saving"?"Saving to cloud…":saveStatus==="saved"?"Saved to cloud":"Save failed — check connection"}
          </div>
        )}

        {/* Bottom Nav */}
        {!["profile","prices"].includes(screen)&&(
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(8,11,18,.96)",borderTop:"1px solid rgba(255,255,255,.07)",backdropFilter:"blur(16px)",display:"flex",padding:"5px 0 10px",zIndex:100}}>
            {NAV.map(item=>{
              const active=screen===item.id;
              return(
                <button key={item.id} onClick={()=>nav(item.id)} style={{flex:1,background:"none",border:"none",color:active?"#00f0dc":"rgba(255,255,255,.26)",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"5px 0",cursor:"pointer",fontFamily:"Outfit",transition:"color .2s"}}>
                  <div style={{fontSize:18,lineHeight:1,filter:active?"drop-shadow(0 0 5px #00f0dc)":"none"}}>{item.icon}</div>
                  <div style={{fontSize:9,fontWeight:active?700:500,letterSpacing:".05em",textTransform:"uppercase"}}>{item.label}</div>
                  {active&&<div style={{width:3,height:3,borderRadius:"50%",background:"#00f0dc"}}/>}
                </button>
              );
            })}
          </div>
        )}
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
